<title>Sapiens Poker Logger v0.2</title>
<style>
:root {
  --bg:#1a1a2e; --card:#252540; --border:#3a3a5c; --text:#e8e8f0;
  --accent:#f0d830; --dim:#8888aa; --pink:#ff69b4; --yellow:#f0d830;
  --mint:#2ecc71; --coral:#e74c3c; --gold:#f39c12;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;background:var(--bg);color:var(--text);padding:0 0 24px;-webkit-tap-highlight-color:transparent}
header{background:linear-gradient(135deg,#2a2a10,#3a3010,#2a2a10);padding:5px 12px;text-align:center;border-bottom:2px solid var(--yellow)}
header h1{font-size:12px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5);letter-spacing:.03em}
.wrap{max-width:480px;margin:0 auto;padding:0 6px}

/* section */
.sec{background:var(--card);border:2px solid rgba(240,216,48,.25);border-radius:7px;margin:4px 0;padding:5px 8px;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.sec-title{font-size:10px;font-weight:800;color:var(--yellow);margin-bottom:2px;letter-spacing:.02em}

/* inputs */
.row{display:flex;gap:4px;margin:2px 0;align-items:center}
.row label{font-size:11px;color:var(--dim);min-width:0;font-weight:600;flex-shrink:0}
.row input,.row select{flex:1;border:1px solid var(--border);border-radius:5px;padding:5px 4px;font-size:14px;background:#1a1a2e;color:var(--text);font-family:inherit;min-width:0}
.row input:focus,.row select:focus{outline:none;border-color:var(--yellow);box-shadow:0 0 0 2px rgba(240,216,48,.25)}
.row input[type="number"]{-moz-appearance:textfield}
.row input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}
.row select{background:var(--card);color:var(--text)}
.sec-save-btn{background:linear-gradient(to bottom,#3a3a5c,#2a2a48);border:1px solid var(--border);border-radius:4px;padding:2px 10px;font-size:11px;font-weight:800;cursor:pointer;line-height:1.3;color:var(--yellow);letter-spacing:.04em;margin-left:6px;vertical-align:middle}
.sec-save-btn:active{background:rgba(240,216,48,.2)}

/* compact grid rows */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin:2px 0}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin:2px 0}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;margin:2px 0}
.g5{display:grid;grid-template-columns:3fr 4fr 4fr 4fr 7fr;gap:3px;margin:2px 0}
.g5b-labels{display:grid;grid-template-columns:5fr 4fr 4fr 4fr 5fr;gap:3px;margin:0 0 1px 0}
.g5b-labels span{font-size:10px;color:var(--dim);font-weight:600;text-align:center}
.g5b{display:grid;grid-template-columns:5fr 4fr 4fr 4fr 5fr;gap:3px;margin:0}
.g2 .row,.g3 .row,.g4 .row,.g5 .row,.g5b .row{margin:0;min-width:0}

/* card slots */
.cards-labels{display:flex;align-items:center;gap:0;margin-bottom:1px}
.cards-labels span{flex:1;text-align:center;font-size:9px;font-weight:700;color:var(--dim)}
.cards-labels .label-sep{flex:0 0 14px}
.cards-row{display:flex;gap:3px;align-items:center;margin:3px 0}
.slot-divider{flex:0 0 2px;height:36px;background:var(--border);border-radius:1px;margin:0 4px}
.card-slot{flex:1;height:32px;border:2px dashed var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;font-family:monospace;background:var(--bg);cursor:pointer;position:relative;transition:border-color .15s}
.card-slot.active-target{border-color:#786c18;background:rgba(120,108,24,.12)}
.card-slot.filled{border-style:solid;border-color:#786c18;background:#2a2a18}
.card-slot.filled.s,.card-slot.filled.c{color:#e0e0e0}
.card-slot.filled.h,.card-slot.filled.d{color:#ff4060}
.card-slot .x{position:absolute;top:-4px;right:-4px;width:14px;height:14px;background:var(--coral);color:#fff;border-radius:50%;font-size:9px;line-height:14px;text-align:center;font-weight:700;display:none}
.card-slot.filled .x{display:block}

/* card picker */
.picker{background:#1e1e36;border:1px solid var(--border);border-radius:6px;padding:4px 5px;margin:4px 0}
.picker-label{font-size:9px;color:var(--dim);margin-bottom:1px;font-weight:600}
.rank-row,.suit-row{display:flex;flex-wrap:wrap;gap:2px;margin:1px 0}
.rank-btn,.suit-btn{border:1px solid var(--border);border-radius:4px;padding:4px 0;font-size:14px;font-weight:700;font-family:monospace;cursor:pointer;text-align:center;background:var(--card);color:var(--text);transition:all .12s}
.rank-btn{flex:0 0 calc((100% - 8px)/5);min-width:0;padding:6px 0;font-size:16px}
.rank-btn.t-btn{font-size:14px}
.suit-btn{flex:1;padding:6px 0;font-size:22px}
.rank-btn:active,.suit-btn:active{transform:scale(.93)}
.rank-btn.used{opacity:.2;pointer-events:none}
.suit-btn.used{opacity:.2;pointer-events:none}
.rank-btn.sel{background:var(--yellow);color:#1a1a1a;border-color:#d0c020}
.suit-s{color:#e0e0e0}.suit-h{color:#ff4060}.suit-d{color:#ff4060}.suit-c{color:#e0e0e0}
.suit-btn.s-s{border-color:#888}.suit-btn.s-h{border-color:#ff4060}.suit-btn.s-d{border-color:#ff4060}.suit-btn.s-c{border-color:#888}

/* player list */
.pl-row{display:flex;gap:3px;margin:2px 0;align-items:center}
.pl-row .d-tap{width:24px;height:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;font-size:11px;font-weight:800;color:transparent;border-radius:50%;line-height:1;padding-top:1px}
.pl-row .d-tap:active{transform:scale(.9)}
.pl-row .d-tap.is-btn{background:#e0e0e0;color:#1a1a1a}
.pl-row .seat-badge{display:flex;align-items:center;justify-content:center;width:30px;flex-shrink:0;cursor:pointer}
.pl-row .seat-badge:active{transform:scale(.9)}
.pl-row .seat-badge .seat-num{font-size:13px;font-weight:700;color:var(--dim);width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;border:2px solid transparent;line-height:1;padding-top:1px}
.pl-row:not(.inactive):not(.is-hero) .seat-badge .seat-num{background:#80355a;color:#fff;border-color:#80355a}
.pl-row.is-hero .seat-badge .seat-num{background:#786c18;color:#fff;border-color:#786c18}
.pl-row input.name-in{flex:1;height:30px;padding:0 6px;font-size:14px;border:2px solid #80355a;border-radius:5px;background:#1a1a1a;color:#fff;font-family:inherit;font-weight:600}
.pl-row input.name-in:focus{outline:none;border-color:#80355a;box-shadow:0 0 0 2px rgba(128,53,90,.3)}
.pl-row.is-hero input.name-in{border-color:#786c18}
.pl-row.is-hero input.name-in:focus{border-color:#786c18;box-shadow:0 0 0 2px rgba(120,108,24,.3)}
.pl-row .rm-btn{width:22px;height:22px;border:none;background:var(--border);color:var(--dim);border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;line-height:22px;text-align:center}
.pl-row.inactive{opacity:.3}
.pl-row.inactive .seat-badge{margin-right:20px}
.pl-row.inactive input.name-in{pointer-events:none}
.pl-row.inactive .rm-btn{background:#555}
.pl-row.is-hero{background:linear-gradient(90deg,rgba(240,216,48,.1),transparent);border-radius:5px}
.utg-hint{font-size:9px;color:var(--dim);font-weight:400;margin-left:6px}

/* generate */
.gen-btn{display:block;width:44%;margin:6px auto 4px;padding:5px 8px;border:none;border-radius:5px;font-size:11px;font-weight:800;color:#fff;cursor:pointer;background:linear-gradient(135deg,#a09018,#b8a820,#a09018);box-shadow:0 2px 6px rgba(0,0,0,.3);letter-spacing:.04em}
.gen-btn:active{transform:scale(.97)}

/* output */
.output-wrap{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px;margin:6px 0;display:none}
.output-wrap.show{display:block}
.output-label{font-size:10px;color:var(--yellow);font-weight:600;margin-bottom:2px}
.output-text{width:100%;min-height:180px;border:1px solid var(--border);border-radius:5px;padding:6px;font-size:14px;font-family:"SFMono-Regular",Consolas,monospace;color:var(--text);background:var(--bg);resize:vertical;line-height:1.5;-webkit-user-select:text;user-select:text;-webkit-appearance:none;cursor:text}
.output-text:focus{outline:none;border-color:var(--yellow);box-shadow:0 0 0 2px rgba(240,216,48,.25)}
.copy-row{display:flex;gap:5px;margin-top:4px}
.copy-row{justify-content:center}
.action-btn{flex:1;padding:5px 8px;border:none;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#a09018,#b8a820,#a09018);color:#fff}
.action-btn:active{transform:scale(.97)}

</head>
<body>

<header>
  <h1>Sapiens Poker Logger v0.2</h1>
</header>

<!-- ===== View 0: Trips List ===== -->
<div class="view" id="viewTrips">
<div class="wrap">
  <img src="title_image_lv07.png" alt="Sapiens Poker Logger" style="width:100%;border-radius:10px;margin:6px 0;display:block">
  <p style="font-size:11px;color:var(--dim);line-height:1.6;text-align:center;margin:4px 0 8px">当アプリは、ライブポーカーのハンド履歴や収支を、その場で素早く記録できるアプリです。<br>遠征ごとのプレイ時間やBB/hrを自動集計。登録不要、完全無料、すぐにご利用いただけます。</p>
  <button class="new-session-btn" onclick="showNewTripModal()">新しい記録を作成</button>

  <div id="tripsGuide"></div>
</div>
</div>

<!-- ===== View 1: Sessions List (per Trip) ===== -->
<div class="view" id="viewSessions">
<div class="wrap">
  <div class="trip-header">
    <button class="trip-back" onclick="showView('trips')">&larr; 記録一覧</button>
    <span class="trip-name" id="currentTripName"></span>
  </div>

  </div>
</div>
</div>

<!-- ===== View 2: Active Session ===== -->
<div class="view" id="viewActive">
<div class="wrap">

  <!-- Session info bar -->
  <div class="session-bar" id="sessionBar"></div>

  <!-- Hand / Blind / Hero -->
  <div class="sec">
    <div class="sec-title">Hand / Blind <button class="sec-save-btn" onclick="saveAllDefaults(this)" title="Blind/Hero/Stack&#x306E;&#x30C7;&#x30D5;&#x30A9;&#x30EB;&#x30C8;&#x3092;&#x4E00;&#x62EC;&#x4FDD;&#x5B58;">SAVE</button></div>
    <input type="hidden" id="heroSeat" value="1">
    <div class="g5b-labels">
      <span>Hand #</span><span>SB</span><span>BB</span><span>Ante</span><span></span>
    </div>
    <div class="g5b">
      <div class="row"><input type="number" id="handNum" value="1" min="1" max="99" inputmode="numeric"></div>
      <div class="row"><input type="number" id="sb" value="50" inputmode="numeric"></div>
      <div class="row"><input type="number" id="bb" value="100" inputmode="numeric"></div>
      <div class="row"><input type="number" id="ante" value="0" inputmode="numeric"></div>
      <div class="row"><select id="blindPreset" onchange="applyBlindPreset()"><option value="">---</option><option value="1/2">1/2</option><option value="1/3">1/3</option><option value="2/3">2/3</option><option value="2/5">2/5</option><option value="5/5">5/5</option><option value="10/20">10/20</option><option value="25/50">25/50</option><option value="50/100" selected>50/100</option><option value="100/200">100/200</option><option value="200/300">200/300</option><option value="200/400">200/400</option><option value="200/500">200/500</option><option value="300/500">300/500</option><option value="400/800">400/800</option><option value="500/1000">500/1000</option></select></div>
    </div>
    <div class="g2">
      <div class="row"><label>Hero</label><input type="text" id="heroName" value="&#x30C1;&#x30F3;&#x30D1;&#x30F3;" oninput="syncHeroName()"></div>
      <div class="row"><label>Stack</label><input type="number" id="heroStack" value="50000" inputmode="numeric"></div>
    </div>
  </div>

  <!-- Cards -->
  <div class="sec">
    <div class="sec-title">Cards</div>
    <div class="cards-labels">
      <span>Hero</span><span>Hero</span>
      <span class="label-sep"></span>
      <span>Flop</span><span></span><span></span><span>Turn</span><span>River</span>
    </div>
    <div class="cards-row">
      <div class="card-slot" id="heroSlot0" onclick="onSlotClick(event,'heroCards',0)"></div>
      <div class="card-slot" id="heroSlot1" onclick="onSlotClick(event,'heroCards',1)"></div>
      <div class="slot-divider"></div>
      <div class="card-slot" id="boardSlot0" onclick="onSlotClick(event,'boardCards',0)"></div>
      <div class="card-slot" id="boardSlot1" onclick="onSlotClick(event,'boardCards',1)"></div>
      <div class="card-slot" id="boardSlot2" onclick="onSlotClick(event,'boardCards',2)"></div>
      <div class="card-slot" id="boardSlot3" onclick="onSlotClick(event,'boardCards',3)"></div>
      <div class="card-slot" id="boardSlot4" onclick="onSlotClick(event,'boardCards',4)"></div>
    </div>
    <div class="picker" id="sharedPicker"></div>
  </div>

  <!-- Players -->
  <div class="sec">
    <div class="sec-title">Players <span class="utg-hint">D=BTN / &#x756A;&#x53F7;=Hero</span> <button class="sec-save-btn" onclick="saveDefaultPlayers(this)" title="&#x30C7;&#x30D5;&#x30A9;&#x30EB;&#x30C8;&#x4EBA;&#x6570;&#x3092;&#x4FDD;&#x5B58;">SAVE</button></div>
    <div id="playerList"></div>
  </div>

  <!-- Generate + Hands + End row -->
  <div style="display:flex;gap:4px;margin:6px 0 4px">
    <button class="gen-btn" onclick="generate()" style="margin:0;width:auto;flex:2">&#x30C6;&#x30F3;&#x30D7;&#x30EC;&#x30FC;&#x30C8;&#x751F;&#x6210;</button>

  <!-- Output -->
  <div class="output-wrap" id="outputWrap">

</div>

<!-- ===== View 3: Session Detail ===== -->
<div class="view" id="viewDetail">
<div class="wrap">
  <button class="detail-back" onclick="showView('sessions')">&larr; Back</button>
  <div id="detailContent"></div>
</div>

<!-- ===== Modal ===== -->
<div class="modal-overlay" id="modalOverlay" onclick="hideModal()">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="modal-title" id="modalTitle"></div>
    <div id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== Data structures =====
var RANK_ROWS = [['A','2','3','4','5'],['6','7','8','9','T'],['J','Q','K']];
var RANKS = RANK_ROWS.reduce(function(a,b){return a.concat(b)},[]);
var SUITS = [{k:'s',sym:'\u2660',cls:'suit-s'},{k:'c',sym:'\u2663',cls:'suit-c'},{k:'h',sym:'\u2665',cls:'suit-h'},{k:'d',sym:'\u2666',cls:'suit-d'}];
var allUsed = new Set();
var cardData = {
  heroCards: {cards:[], max:2},
  boardCards: {cards:[], max:5}
};
var activeTarget = 'heroCards';
var selRank = null;
var removedSeats = new Set([10]);
var btnSeat = 1;

var sessions = [];
var activeSessionId = null;
var currentDetailId = null;
var timerInterval = null;

var trips = [];
var currentTripId = null;

var FEEDBACK_URL = 'https://forms.gle/XDw4C5kKdToUyaW5A';

// ===== Picker (from v1) =====
function buildPicker() {
  var picker = document.getElementById('sharedPicker');
  var html = '<div class="picker-label">Rank</div>';
  RANK_ROWS.forEach(function(row) {
    html += '<div class="rank-row">';
    row.forEach(function(r) {
      var cls = r === 'T' ? 'rank-btn t-btn' : 'rank-btn';
      var display = r === 'T' ? '10' : r;
      html += '<button class="'+cls+'" data-rank="'+r+'" onclick="pickRank(\''+r+'\',this)">'+display+'</button>';
    });
    html += '</div>';
  });
  html += '<div class="picker-label" style="margin-top:3px">Suit</div><div class="suit-row">';
  SUITS.forEach(function(s) {
    html += '<button class="suit-btn s-'+s.k+' '+s.cls+'" data-suit="'+s.k+'" onclick="pickSuit(\''+s.k+'\')">'+s.sym+'</button>';
  });
  html += '</div>';
  picker.innerHTML = html;
}

function pickRank(rank, btn) {
  var picker = document.getElementById('sharedPicker');
  picker.querySelectorAll('.rank-btn').forEach(function(b){b.classList.remove('sel')});
  btn.classList.add('sel');
  selRank = rank;
  refreshUsed();
}

function pickSuit(suit) {
  if (!selRank) return;
  var st = cardData[activeTarget];
  if (st.cards.length >= st.max) return;

  var card = selRank + suit;
  var cardUpper = card.toUpperCase();
  if (allUsed.has(cardUpper)) return;

  st.cards.push(card);
  allUsed.add(cardUpper);
  selRank = null;

  var picker = document.getElementById('sharedPicker');
  picker.querySelectorAll('.rank-btn').forEach(function(b){b.classList.remove('sel')});

  renderAllSlots();
  refreshUsed();

  if (activeTarget === 'heroCards' && st.cards.length >= st.max) {
    setTarget('boardCards');
  }
}

function removeSlotCard(target, idx) {
  var st = cardData[target];
  if (!st.cards[idx]) return;
  var removed = st.cards.splice(idx, 1)[0];
  allUsed.delete(removed.toUpperCase());
  renderAllSlots();
  refreshUsed();
  setTarget(target);
}

function onSlotClick(e, target, idx) {
  e.stopPropagation();
  var st = cardData[target];
  if (st.cards[idx]) {
    removeSlotCard(target, idx);
  } else {
    setTarget(target);
  }
}

function setTarget(target) {
  activeTarget = target;
  selRank = null;
  var picker = document.getElementById('sharedPicker');
  picker.querySelectorAll('.rank-btn').forEach(function(b){b.classList.remove('sel')});
  document.querySelectorAll('.card-slot').forEach(function(el){el.classList.remove('active-target')});
  var prefix = target === 'heroCards' ? 'heroSlot' : 'boardSlot';
  var max = cardData[target].max;
  for (var i = 0; i < max; i++) {

function refreshUsed() {
  var picker = document.getElementById('sharedPicker');
  picker.querySelectorAll('.rank-btn').forEach(function(rb) {
    var rank = rb.dataset.rank;
    var anyAvail = SUITS.some(function(s){return !allUsed.has((rank+s.k).toUpperCase())});
    rb.classList.toggle('used', !anyAvail);
  });
  picker.querySelectorAll('.suit-btn').forEach(function(sb) {
    var suit = sb.dataset.suit;
    if (selRank) {
      sb.classList.toggle('used', allUsed.has((selRank+suit).toUpperCase()));

      sb.classList.remove('used');

function renderSlotRow(target, prefix, count) {
  var st = cardData[target];
  for (var i = 0; i < count; i++) {
    var el = document.getElementById(prefix + i);
    if (st.cards[i]) {
      var c = st.cards[i];
      var suit = c.slice(-1);
      var rank = c.slice(0, -1);
      var display = rank === 'T' ? '10' : rank;
      var sym = SUITS.filter(function(s){return s.k===suit})[0].sym;
      el.className = 'card-slot filled ' + suit;
      el.innerHTML = display + sym + '<span class="x">&times;</span>';
    } else {
      el.className = 'card-slot';
      el.innerHTML = '';

// ===== Utility functions =====
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')}, 1500);
}

function formatDate(iso) {
  if (!iso) return '--';
  var d = new Date(iso);
  var mm = ('0' + (d.getMonth()+1)).slice(-2);
  var dd = ('0' + d.getDate()).slice(-2);
  var hh = ('0' + d.getHours()).slice(-2);
  var mi = ('0' + d.getMinutes()).slice(-2);
  return mm + '/' + dd + ' ' + hh + ':' + mi;
}

function formatDateShort(iso) {
  if (!iso) return '--';
  var d = new Date(iso);
  var y = d.getFullYear();
  var mm = ('0' + (d.getMonth()+1)).slice(-2);
  var dd = ('0' + d.getDate()).slice(-2);
  return y + '/' + mm + '/' + dd;
}

function formatCurrency(n) {
  var num = parseInt(n) || 0;
  var sign = num >= 0 ? '+' : '';
  return sign + formatNumber(num);
}

function formatNumber(n) {
  var num = parseInt(n) || 0;
  var neg = num < 0;
  var abs = Math.abs(num);
  var str = abs.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return neg ? '-' + str : str;
}

function formatElapsed(startISO) {
  if (!startISO) return '0h 0m';
  var start = new Date(startISO).getTime();
  var now = Date.now();
  var diff = Math.max(0, now - start);
  var totalMin = Math.floor(diff / 60000);
  var h = Math.floor(totalMin / 60);
  var m = totalMin % 60;
  return h + 'h ' + m + 'm';
}

function loadTrips() {
  try {
    var d = localStorage.getItem('pokerTrips_v1');
    if (d) trips = JSON.parse(d);
  } catch(e) {
    trips = [];
  }
}

function persistTrips() {
  localStorage.setItem('pokerTrips_v1', JSON.stringify(trips));
}

function getTrip(id) {
  for (var i = 0; i < trips.length; i++) {
    if (trips[i].id === id) return trips[i];
  }
  return null;
}

function createTrip(data) {
  var trip = {
    id: 'trip_' + Date.now() + '_' + Math.floor(Math.random()*10000),
    title: data.title || '',
    createdAt: new Date().toISOString(),
    status: 'active'
  };
  trips.unshift(trip);
  persistTrips();
  return trip;
}

function deleteTrip(id) {
  for (var i = 0; i < trips.length; i++) {
    if (trips[i].id === id) {
      // Delete all sessions in this trip
      sessions = sessions.filter(function(s) { return s.tripId !== id; });
      persistSessions();
      trips.splice(i, 1);
      persistTrips();
      renderTripsList();
      return;
    }
  }
}

function calcTripStats(tripId) {
  var tripSessions = sessions.filter(function(s) { return s.tripId === tripId; });
  var completed = tripSessions.filter(function(s) { return s.status === 'completed'; });
  var totalProfit = 0;
  var totalMin = 0;
  for (var i = 0; i < completed.length; i++) {
    var st = calcSessionStats(completed[i]);
    totalProfit += st.profit;
    totalMin += st.durationMin;
  }
  return {
    sessionCount: tripSessions.length,
    completedCount: completed.length,
    totalProfit: totalProfit,
    totalHours: Math.round(totalMin / 60 * 10) / 10
  };
}

function createSession(data) {
  var sbVal = parseInt(data.sb) || 0;
  var bbVal = parseInt(data.bb) || 0;
  var now = new Date().toISOString();
  var session = {
    id: 'sess_' + Date.now() + '_' + Math.floor(Math.random()*10000),
    tripId: currentTripId || '',
    location: data.location || '',
    gameType: data.gameType || 'NLH',
    sb: sbVal,
    bb: bbVal,
    blindPhases: [{ sb: sbVal, bb: bbVal, startTime: now }],
    buyIns: [parseInt(data.buyInAmount) || 0],
    cashOut: 0,
    startTime: now,
    endTime: null,
    status: 'active',
    hands: []
  };
  sessions.unshift(session);
  persistSessions();
  activeSessionId = session.id;

  // Set blinds on the active session UI
  var blindStr = session.sb + '/' + session.bb;
  var sel = document.getElementById('blindPreset');
  var found = false;
  for (var i = 0; i < sel.options.length; i++) {
    if (sel.options[i].value === blindStr) {
      sel.value = blindStr;
      found = true;
      break;
    }
  }
  if (!found) {
    document.getElementById('sb').value = session.sb;
    document.getElementById('bb').value = session.bb;
  } else {
    applyBlindPreset();
  }

  document.getElementById('handNum').value = 1;
  showView('active');
  return session;
}

function endSession(cashOut) {
  var session = getActiveSession();
  if (!session) return;
  session.cashOut = parseInt(cashOut) || 0;
  session.endTime = new Date().toISOString();
  session.status = 'completed';
  persistSessions();
  activeSessionId = null;
  stopTimer();
  showView('sessions');
  showToast('Session ended');
}

function addBuyInToSession(amount) {
  var session = getActiveSession();
  if (!session) return;
  session.buyIns.push(parseInt(amount) || 0);
  persistSessions();
  renderSessionBar();
  showToast('Buy-in added: ' + formatNumber(amount));
}

function deleteSession(id) {
  for (var i = 0; i < sessions.length; i++) {
    if (sessions[i].id === id) {
      if (sessions[i].status === 'active') {
        activeSessionId = null;
        stopTimer();
      }
      sessions.splice(i, 1);
      persistSessions();
      renderCumulativeStats();
      renderSessionsList();
      return;
    }
  }
}

// ===== Blind Phase Management =====
function getCurrentBlinds(session) {
  if (session.blindPhases && session.blindPhases.length > 0) {
    var last = session.blindPhases[session.blindPhases.length - 1];
    return { sb: last.sb, bb: last.bb };
  }
  return { sb: session.sb || 0, bb: session.bb || 0 };
}

function getBlindsLabel(session) {
  if (session.blindPhases && session.blindPhases.length > 1) {
    return session.blindPhases.map(function(p) { return p.sb + '/' + p.bb; }).join(' → ');
  }
  return (session.sb || 0) + '/' + (session.bb || 0);
}


// ===== Session Stats =====
function calcSessionStats(session) {
  var totalBuyIn = 0;
  for (var i = 0; i < session.buyIns.length; i++) {
    totalBuyIn += session.buyIns[i];
  }
  var cashOut = session.cashOut || 0;
  var profit = cashOut - totalBuyIn;
  var durationMin = 0;
  if (session.startTime) {
    var end = session.endTime ? new Date(session.endTime).getTime() : Date.now();
    durationMin = Math.max(0, Math.floor((end - new Date(session.startTime).getTime()) / 60000));
  }

  // Weighted average BB calculation for blind phases
  var bb = session.bb || 1;
  if (session.blindPhases && session.blindPhases.length > 1) {
    var endTime = session.endTime ? new Date(session.endTime).getTime() : Date.now();
    var totalWeightedBB = 0;
    var totalPhaseMin = 0;
    for (var i = 0; i < session.blindPhases.length; i++) {
      var phase = session.blindPhases[i];
      var phaseStart = new Date(phase.startTime).getTime();
      var phaseEnd = (i + 1 < session.blindPhases.length) ? new Date(session.blindPhases[i + 1].startTime).getTime() : endTime;
      var phaseMin = Math.max(0, (phaseEnd - phaseStart) / 60000);
      totalWeightedBB += phase.bb * phaseMin;
      totalPhaseMin += phaseMin;
    }
    bb = totalPhaseMin > 0 ? (totalWeightedBB / totalPhaseMin) : (session.bb || 1);
  }

  var hours = durationMin / 60;
  var bbPerHour = hours > 0 ? ((profit / bb) / hours) : 0;
  return {
    totalBuyIn: totalBuyIn,
    cashOut: cashOut,
    profit: profit,
    durationMin: durationMin,
    bbPerHour: Math.round(bbPerHour * 10) / 10,
    handCount: session.hands ? session.hands.length : 0
  };
}

// ===== Session Rendering =====
function getTripSessions() {
  if (!currentTripId) return sessions;
  return sessions.filter(function(s) { return s.tripId === currentTripId; });
}

function renderCumulativeStats() {
  var el = document.getElementById('cumulativeStats');
  var tripSess = getTripSessions();
  var completed = tripSess.filter(function(s){return s.status === 'completed'});
  if (completed.length === 0) {
    el.innerHTML = '<div class="stat-cards"><div class="stat-card"><div class="stat-label">Total P/L</div><div class="stat-value">--</div></div><div class="stat-card"><div class="stat-label">Sessions</div><div class="stat-value">0</div></div><div class="stat-card"><div class="stat-label">Total Hours</div><div class="stat-value">--</div></div><div class="stat-card"><div class="stat-label">BB/hr</div><div class="stat-value">--</div></div></div>';
    return;
  }
  var totalProfit = 0;
  var totalMin = 0;
  var totalBBProfit = 0;
  for (var i = 0; i < completed.length; i++) {
    var st = calcSessionStats(completed[i]);
    totalProfit += st.profit;
    totalMin += st.durationMin;
    var bb = completed[i].bb || 1;
    totalBBProfit += st.profit / bb;
  }
  var totalHours = Math.round(totalMin / 60 * 10) / 10;
  var avgBBhr = totalHours > 0 ? Math.round((totalBBProfit / totalHours) * 10) / 10 : 0;
  var plClass = totalProfit >= 0 ? 'positive' : 'negative';

  el.innerHTML = '<div class="stat-cards">' +
    '<div class="stat-card"><div class="stat-label">Total P/L</div><div class="stat-value ' + plClass + '">' + formatCurrency(totalProfit) + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">Sessions</div><div class="stat-value">' + completed.length + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">Total Hours</div><div class="stat-value">' + totalHours + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">BB/hr</div><div class="stat-value ' + plClass + '">' + avgBBhr + '</div></div>' +
    '</div>';
}

function renderSessionsList() {

      '<div class="si-loc">' + escHtml(s.location || 'No Location') + '</div>' +
      '<div class="si-meta">' + escHtml(s.gameType) + ' ' + getBlindsLabel(s) + ' | ' + durStr + ' | ' + st.handCount + ' hands</div>' +
      '</div>' +
      '<div class="si-pl ' + plClass + '">' + (s.status === 'completed' ? formatCurrency(st.profit) : '--') + '</div>' +
      '<button class="si-del" onclick="event.stopPropagation();confirmDeleteSession(\'' + s.id + '\')">DEL</button>' +

}

function toggleDetailHandItem(i) {
  var el = document.getElementById('dhi-' + i);
  if (el) el.classList.toggle('open');
}

function editDetailField(sessionId, field, el) {
  var s = getSession(sessionId);
  if (!s) return;
  var currentVal = field === 'cashOut' ? s.cashOut : (s[field] || '');
  if (field === 'gameType') {
    var sel = document.createElement('select');
    sel.className = 'ds-edit-input';
    ['NLH','PLO'].forEach(function(opt) {
      var o = document.createElement('option');
      o.value = opt; o.textContent = opt;
      if (opt === s.gameType) o.selected = true;
      sel.appendChild(o);
    });
    el.innerHTML = '';
    el.appendChild(sel);
    sel.focus();
    sel.onchange = function() { saveDetailField(sessionId, field, sel.value); };
    sel.onblur = function() { saveDetailField(sessionId, field, sel.value); };
  } else {
    var inp = document.createElement('input');
    inp.className = 'ds-edit-input';
    inp.type = field === 'cashOut' ? 'number' : 'text';
    inp.value = currentVal;
    if (field === 'cashOut') inp.inputMode = 'numeric';
    el.innerHTML = '';
    el.appendChild(inp);
    inp.focus();
    inp.select();
    inp.onblur = function() { saveDetailField(sessionId, field, inp.value); };
    inp.onkeydown = function(e) { if (e.key === 'Enter') inp.blur(); };
  }
  el.onclick = null;
}

function saveDetailField(sessionId, field, value) {
  var s = getSession(sessionId);
  if (!s) return;
  if (field === 'cashOut') {
    s.cashOut = parseInt(value) || 0;
  } else {
    s[field] = value;
  }
  persistSessions();
  renderSessionDetail(sessionId);
}

function editDateTime(sessionId) {
  var s = getSession(sessionId);
  if (!s) return;
  var pad = function(n) { return n < 10 ? '0' + n : n; };
  var toDateVal = function(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
  };
  var getParts = function(iso) {
    if (!iso) return { h:0, m:0 };
    var d = new Date(iso);
    return { h:d.getHours(), m:d.getMinutes() };
  };
  var st = getParts(s.startTime);
  var en = getParts(s.endTime);
  var ds = 'font-size:14px;font-weight:700;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px 6px;font-family:inherit';
  var ts = 'width:44px;text-align:center;font-size:14px;font-weight:700;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px 2px;font-family:inherit;-moz-appearance:textfield';
  var sep = '<span style="color:var(--dim);font-weight:700;font-size:14px;line-height:30px">';

  var html = '<style>.dt-num::-webkit-inner-spin-button,.dt-num::-webkit-outer-spin-button{opacity:1;height:20px}</style>';
  var lb = 'font-size:12px;color:var(--dim);font-weight:700;width:30px;flex-shrink:0';
  html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">';
  html += '<span style="'+lb+'">開始</span>';
  html += '<input type="date" id="dtSD" value="'+toDateVal(s.startTime)+'" style="'+ds+'">';
  html += '<input type="number" class="dt-num" id="dtSh" value="'+pad(st.h)+'" min="0" max="23" style="'+ts+'">';
  html += sep+':</span><input type="number" class="dt-num" id="dtSm" value="'+pad(st.m)+'" min="0" max="59" style="'+ts+'">';
  html += '</div>';

  html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">';
  html += '<span style="'+lb+'">終了</span>';
  html += '<input type="date" id="dtED" value="'+toDateVal(s.endTime)+'" style="'+ds+'">';
  html += '<input type="number" class="dt-num" id="dtEh" value="'+pad(en.h)+'" min="0" max="23" style="'+ts+'">';
  html += sep+':</span><input type="number" class="dt-num" id="dtEm" value="'+pad(en.m)+'" min="0" max="59" style="'+ts+'">';
  html += '</div>';

  html += '<div style="font-size:9px;color:var(--dim);text-align:center;margin-bottom:6px">時刻はマウスホイールでも変更できます</div>';
  html += '<div class="modal-btn-row" style="margin-top:4px">';
  html += '<button class="action-btn" onclick="saveDateTime(\'' + sessionId + '\')">保存</button>';
  html += '<button class="action-btn secondary" onclick="hideModal()">Cancel</button>';
  html += '</div>';
  showModal('日時編集', html);
  setTimeout(function() {
    var nums = document.querySelectorAll('.dt-num');
    for (var i = 0; i < nums.length; i++) {
      nums[i].addEventListener('wheel', function(e) {
        e.preventDefault();
        var el = e.target;
        var step = e.deltaY < 0 ? 1 : -1;
        var val = parseInt(el.value) + step;
        var mn = parseInt(el.min);
        var mx = parseInt(el.max);
        if (val < mn) val = mx;
        if (val > mx) val = mn;
        el.value = val < 10 ? '0' + val : val;
      }, { passive: false });
    }
  }, 100);
}

function saveDateTime(sessionId) {
  var s = getSession(sessionId);
  if (!s) return;
  var v = function(id) { return parseInt(document.getElementById(id).value) || 0; };
  var buildFromDateInput = function(dateId, hId, mId) {
    var dateVal = document.getElementById(dateId).value;
    if (!dateVal) return null;
    var parts = dateVal.split('-');
    var dt = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]), v(hId), v(mId));
    return isNaN(dt.getTime()) ? null : dt.toISOString();
  };
  var newStart = buildFromDateInput('dtSD','dtSh','dtSm');
  var newEnd = buildFromDateInput('dtED','dtEh','dtEm');
  if (newStart) s.startTime = newStart;
  if (newEnd) s.endTime = newEnd;
  persistSessions();
  hideModal();
  renderSessionDetail(sessionId);
}

function editBuyIns(sessionId) {
  var s = getSession(sessionId);
  if (!s) return;
  var html = '';
  for (var i = 0; i < s.buyIns.length; i++) {
    html += '<div class="row" style="margin-bottom:4px"><label>Buy-in ' + (i + 1) + '</label><input type="number" id="editBuyIn' + i + '" value="' + s.buyIns[i] + '" inputmode="numeric"></div>';
  }

  html += '<button class="action-btn secondary" onclick="hideModal()">Cancel</button>';

  showModal('Buy-ins 編集', html);

function saveBuyIns(sessionId, count) {
  var s = getSession(sessionId);
  if (!s) return;
  for (var i = 0; i < count; i++) {
    var el = document.getElementById('editBuyIn' + i);
    if (el) s.buyIns[i] = parseInt(el.value) || 0;
  }
  persistSessions();
  hideModal();
  renderSessionDetail(sessionId);
}

function reopenSession(id) {
  if (!confirm('\u3053\u306E\u30BB\u30C3\u30B7\u30E7\u30F3\u3092\u518D\u958B\u3057\u307E\u3059\u304B\uFF1F')) return;
  var s = getSession(id);
  if (!s) return;
  s.status = 'active';
  s.endTime = null;
  persistSessions();
  activeSessionId = s.id;

  // Restore blinds on UI
  var blindStr = s.sb + '/' + s.bb;
  var sel = document.getElementById('blindPreset');
  var found = false;
  for (var i = 0; i < sel.options.length; i++) {
    if (sel.options[i].value === blindStr) { sel.value = blindStr; found = true; break; }
  }
  if (!found) {
    document.getElementById('sb').value = s.sb;
    document.getElementById('bb').value = s.bb;
  } else {
    applyBlindPreset();
  }

  // Restore hand number to next available
  var nextHand = s.hands ? s.hands.length + 1 : 1;
  document.getElementById('handNum').value = nextHand;

  showView('active');
  showToast('\u30BB\u30C3\u30B7\u30E7\u30F3\u3092\u518D\u958B\u3057\u307E\u3057\u305F');
}

function confirmDeleteSession(id) {
  if (!confirm('\u3053\u306E\u30BB\u30C3\u30B7\u30E7\u30F3\u3092\u524A\u9664\u3057\u307E\u3059\u304B\uFF1F')) return;
  deleteSession(id);
  if (currentDetailId === id) {
    showView('sessions');
  }
}

// ===== Timer =====
function startTimer() {
  stopTimer();
  timerInterval = setInterval(function() {
    var session = getActiveSession();
    if (!session) { stopTimer(); return; }
    var el = document.getElementById('elapsedTime');
    if (el) el.textContent = formatElapsed(session.startTime);
  }, 1000);
}

function stopTimer() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
}

// ===== Modal =====
function showModal(title, bodyHtml) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalOverlay').classList.add('show');
}

function hideModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function doCreateSession() {
  var loc = document.getElementById('modalLoc').value.trim();
  var game = document.getElementById('modalGame').value;
  var sb = document.getElementById('modalSB').value;
  var bb = document.getElementById('modalBB').value;
  var buyIn = document.getElementById('modalBuyIn').value;
  if (!loc) { showToast('Location required'); return; }
  hideModal();
  createSession({location:loc, gameType:game, sb:sb, bb:bb, buyInAmount:buyIn});
}

function showEndSessionModal() {
  var session = getActiveSession();
  if (!session) return;
  var st = calcSessionStats(session);
  var html = '<div style="text-align:center;font-size:12px;color:var(--dim);margin-bottom:8px">Total Buy-in: ' + formatNumber(st.totalBuyIn) + '</div>' +
    '<div class="row"><label>Cash-out</label><input type="number" id="modalCashOut" value="" inputmode="numeric" placeholder="0"></div>' +
    '<div class="modal-btn-row">' +
    '<button class="action-btn" onclick="doEndSession()">End</button>' +
    '<button class="action-btn secondary" onclick="hideModal()">Cancel</button>' +
    '</div>';
  showModal('End Session', html);
  setTimeout(function(){ var el = document.getElementById('modalCashOut'); if(el) el.focus(); }, 200);
}

function doEndSession() {
  var cashOut = document.getElementById('modalCashOut').value;
  hideModal();
  endSession(cashOut);
}

function showBuyInModal() {
  var html = '<div class="row"><label>Amount</label><input type="number" id="modalBuyInAmt" value="" inputmode="numeric" placeholder="0"></div>' +
    '<div class="modal-btn-row">' +
    '<button class="action-btn" onclick="doBuyIn()">Add</button>' +
    '<button class="action-btn secondary" onclick="hideModal()">Cancel</button>' +
    '</div>';
  showModal('Add Buy-in', html);
  setTimeout(function(){ var el = document.getElementById('modalBuyInAmt'); if(el) el.focus(); }, 200);
}

function doBuyIn() {
  var amt = document.getElementById('modalBuyInAmt').value;
  if (!amt || parseInt(amt) <= 0) { showToast('Enter amount'); return; }
  hideModal();
  addBuyInToSession(parseInt(amt));
}

// ===== Hand List (session-based) =====
function saveToHandList() {
  var text = document.getElementById('outputText').value.trim();
  if (!text) { showToast('Empty'); return; }
  var session = getActiveSession();
  if (!session) { showToast('No active session'); return; }
  var m = text.match(/^#(\d+)/);
  var label = m ? '#' + (m[1].length < 2 ? '0' + m[1] : m[1]) : '#??';
  session.hands.push({label:label, text:text});
  persistSessions();
  renderHandsList();
  updateHandsBadge();
  showToast('Saved: ' + label);
  document.getElementById('outputWrap').classList.remove('show');
}

function discardOutput() {
  document.getElementById('outputWrap').classList.remove('show');
  document.getElementById('outputText').value = '';
  if (window._lastGeneratedHn) {
    document.getElementById('handNum').value = window._lastGeneratedHn;
    window._lastGeneratedHn = null;
  }
}

function toggleHandsPanel() {
  var p = document.getElementById('handsPanel');
  if (p.classList.contains('show')) {
    p.classList.remove('show');
  } else {
    renderHandsList();
    p.classList.add('show');
  }
}

function renderHandsList() {
  var el = document.getElementById('handsList');
  var session = getActiveSession();
  var hands = session ? session.hands : [];
  if (!hands.length) {
    el.innerHTML = '<p style="color:var(--dim);font-size:12px;text-align:center;padding:8px 0">\u4FDD\u5B58\u3055\u308C\u305F\u30CF\u30F3\u30C9\u306F\u3042\u308A\u307E\u305B\u3093</p>';
    return;
  }
  var html = '';
  for (var i = 0; i < hands.length; i++) {
    var h = hands[i];
    var summary = h.text.split('\n').slice(0,3).join(' ').substring(0,60);
    html += '<div class="hand-item" id="hi-' + i + '">';
    html += '<div class="hand-item-header" onclick="toggleHandItem(' + i + ')">';
    html += '<span class="hand-title">' + escHtml(h.label) + '</span>';
    html += '<span class="hand-summary">' + escHtml(summary) + '</span>';
    html += '<button class="hand-del" onclick="event.stopPropagation();deleteHand(' + i + ')">DEL</button>';
    html += '</div>';
    html += '<div class="hand-item-body"><pre>' + escHtml(h.text) + '</pre></div>';
    html += '</div>';
  }
  el.innerHTML = html;
}

function toggleHandItem(i) {
  var el = document.getElementById('hi-' + i);
  if (el) el.classList.toggle('open');
}

function deleteHand(i) {
  var session = getActiveSession();
  if (!session) return;
  session.hands.splice(i, 1);
  persistSessions();
  renderHandsList();
  updateHandsBadge();
  showToast('Deleted');
}

function updateHandsBadge() {
  var session = getActiveSession();
  var count = session && session.hands ? session.hands.length : 0;
  var el = document.getElementById('handsBadge');
  if (el) el.textContent = count;
}

function exportTripCSV() {
  var trip = getTrip(currentTripId);
  if (!trip) { showToast('Tripが見つかりません'); return; }
  var tripSess = getTripSessions();
  var completed = tripSess.filter(function(s) { return s.status === 'completed'; });
  if (completed.length === 0) { showToast('完了セッションがありません'); return; }

  // Sort by startTime
  completed.sort(function(a, b) { return new Date(a.startTime).getTime() - new Date(b.startTime).getTime(); });

  // Group by date (local)
  var days = {};
  var dayOrder = [];
  for (var i = 0; i < completed.length; i++) {
    var s = completed[i];
    var d = new Date(s.startTime);
    var dayKey = d.getFullYear() + '/' + ('0'+(d.getMonth()+1)).slice(-2) + '/' + ('0'+d.getDate()).slice(-2);
    if (!days[dayKey]) { days[dayKey] = []; dayOrder.push(dayKey); }
    days[dayKey].push(s);
  }

  var BOM = '\uFEFF';
  var lines = [];
  lines.push('Day,Session#,Location,Game,Blinds,StartTime,EndTime,Hours,BuyIn,CashOut,P/L,DayCumulativeP/L,TripCumulativeP/L');

  var tripCumPL = 0;
  for (var di = 0; di < dayOrder.length; di++) {
    var dayKey = dayOrder[di];
    var daySessions = days[dayKey];
    var dayCumPL = 0;

    for (var si = 0; si < daySessions.length; si++) {
      var s = daySessions[si];
      var st = calcSessionStats(s);
      var blindsStr = getBlindsLabel(s);
      var durHours = Math.round(st.durationMin / 60 * 10) / 10;

      dayCumPL += st.profit;
      tripCumPL += st.profit;

      var startD = new Date(s.startTime);
      var endD = new Date(s.endTime);
      var startStr = ('0'+startD.getHours()).slice(-2) + ':' + ('0'+startD.getMinutes()).slice(-2);
      var endStr = ('0'+endD.getHours()).slice(-2) + ':' + ('0'+endD.getMinutes()).slice(-2);

      var row = [
        dayKey,
        ('0' + (si + 1)).slice(-2),
        '"' + (s.location || '').replace(/"/g, '""') + '"',
        s.gameType || 'NLH',
        '"' + blindsStr + '"',
        startStr,
        endStr,
        durHours,
        st.totalBuyIn,
        st.cashOut,
        st.profit,
        dayCumPL,
        tripCumPL
      ];
      lines.push(row.join(','));
    }
  }

  var csv = BOM + lines.join('\r\n');
  var blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  var titleStr = (trip.title || 'trip').replace(/[^a-zA-Z0-9\u3000-\u9FFF]/g, '_');
  a.download = 'trip_' + titleStr + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  showToast('CSV exported: ' + completed.length + ' sessions');
}

function exportSessionHands(sessionId) {
  var session = getSession(sessionId);
  if (!session || !session.hands || !session.hands.length) { showToast('No hands'); return; }
  var parts = [];
  for (var i = 0; i < session.hands.length; i++) {
    parts.push(session.hands[i].text);
  }
  var text = parts.join('\n\n========================================\n\n');
  var now = new Date();
  var ds = now.getFullYear() + ('0'+(now.getMonth()+1)).slice(-2) + ('0'+now.getDate()).slice(-2);
  var locStr = (session.location || 'session').replace(/[^a-zA-Z0-9]/g, '_');
  var blob = new Blob([text.replace(/\n/g, '\r\n')], {type:'text/plain;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'hands_' + locStr + '_' + ds + '.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  showToast('Exported: ' + session.hands.length + ' hands');
}

function clearAllHands() {
  var session = getActiveSession();
  if (!session || !session.hands || !session.hands.length) return;
  if (!confirm('\u4FDD\u5B58\u6E08\u307F\u306E\u5168\u30CF\u30F3\u30C9(' + session.hands.length + '\u4EF6)\u3092\u524A\u9664\u3057\u307E\u3059\u304B\uFF1F')) return;
  session.hands = [];
  persistSessions();
  renderHandsList();
  updateHandsBadge();
  showToast('Cleared');
}

// ===== Defaults (with _v2 suffix) =====
function saveAllDefaults(btn) {
  localStorage.setItem('pokerDefaultHero_v2', document.getElementById('heroName').value.trim());
  localStorage.setItem('pokerDefaultStack_v2', document.getElementById('heroStack').value.trim());
  var blind = document.getElementById('blindPreset').value;
  if (blind) localStorage.setItem('pokerDefaultBlind_v2', blind);
  btn.textContent = '\u2705';
  setTimeout(function(){btn.textContent='SAVE'}, 800);
}

function saveDefaultPlayers(btn) {
  var activeCount = 10 - removedSeats.size;
  localStorage.setItem('pokerDefaultPlayerCount_v2', String(activeCount));
  btn.textContent = '\u2705';
  setTimeout(function(){btn.textContent='SAVE'}, 800);
}

function loadDefaults() {
  var hero = localStorage.getItem('pokerDefaultHero_v2');
  if (hero) { document.getElementById('heroName').value = hero; syncHeroName(); }
  var stack = localStorage.getItem('pokerDefaultStack_v2');
  if (stack) { document.getElementById('heroStack').value = stack; }
  var blind = localStorage.getItem('pokerDefaultBlind_v2');
  if (blind) {
    var sel = document.getElementById('blindPreset');
    sel.value = blind;
    applyBlindPreset();
  }
  var pc = localStorage.getItem('pokerDefaultPlayerCount_v2');
  if (pc) {
    var count = parseInt(pc);
    if (count >= 2 && count <= 10) {
      removedSeats.clear();
      for (var i = 10; i > count; i--) removedSeats.add(i);
    }
  }
}

// ===== Manual & Feedback =====
function openFeedback() {
  if (!FEEDBACK_URL) { showToast('Feedback URL\u672A\u8A2D\u5B9A'); return; }
  window.open(FEEDBACK_URL, '_blank');
}

function toggleManual() {
  var w = document.getElementById('manualWrap');
  var f = document.getElementById('manualFrame');
  var b = document.getElementById('manualToggle');
  if (w.style.display === 'none') {
    w.style.display = 'block';
    b.textContent = '\u30DE\u30CB\u30E5\u30A2\u30EB \u25B2';
    if (f.src === 'about:blank' || !f.src.includes('manual.html')) {
      f.src = 'manual.html';
      f.onload = function(){
        setTimeout(function(){window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'})},300);
      };
    } else {
      setTimeout(function(){window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'})},50);
    }
  } else {
    w.style.display = 'none';
    b.textContent = '\u30DE\u30CB\u30E5\u30A2\u30EB';
  }
}

window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'manualHeight') {
    var f = document.getElementById('manualFrame');
    var oldH = f.offsetHeight;
    var newH = e.data.h;
    if (oldH === newH) return;
    var scrollY = window.scrollY;
    var rect = f.getBoundingClientRect();
    f.style.height = newH + 'px';
    if (rect.top < 0) {
      window.scrollTo(0, scrollY + (newH - oldH));
    }
  }
});

// ===== Migration =====
function migrateData() {
  // Migrate existing sessions without tripId
  var needsMigration = false;
  for (var i = 0; i < sessions.length; i++) {
    if (!sessions[i].tripId) {
      needsMigration = true;
      break;
    }
  }
  // Migrate sessions without blindPhases
  for (var i = 0; i < sessions.length; i++) {
    if (!sessions[i].blindPhases) {
      sessions[i].blindPhases = [{ sb: sessions[i].sb || 0, bb: sessions[i].bb || 0, startTime: sessions[i].startTime }];
    }
  }

  if (needsMigration) {
    // Create a default trip for orphan sessions
    var defaultTrip = {
      id: 'trip_migrated_default',
      title: '未分類セッション',
      createdAt: sessions.length > 0 ? sessions[sessions.length - 1].startTime : new Date().toISOString(),
      status: 'active'
    };
    // Check if default trip already exists
    if (!getTrip(defaultTrip.id)) {
      trips.push(defaultTrip);
      persistTrips();
    }
    for (var i = 0; i < sessions.length; i++) {
      if (!sessions[i].tripId) {
        sessions[i].tripId = defaultTrip.id;
      }
    }
    persistSessions();
  }
}

// ===== Init =====
function init() {
  loadDefaults();
  loadTrips();
  loadSessions();
  migrateData();
  buildPicker();
  renderAllSlots();
  buildPlayerList();
  highlightHeroSeat();

  // Check for active session
  var active = getActiveSession();
  if (active) {
    activeSessionId = active.id;
    currentTripId = active.tripId || null;
    showView('active');
  } else {
    showView('trips');
  }
}

init();
