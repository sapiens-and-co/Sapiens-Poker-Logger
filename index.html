<title>Sapiens Poker Logger v0.2</title>
<style>
:root {
  --bg:#1a1a2e; --card:#252540; --border:#3a3a5c; --text:#e8e8f0;
  --accent:#f0d830; --dim:#8888aa; --pink:#ff69b4; --yellow:#f0d830;
  --mint:#2ecc71; --coral:#e74c3c; --gold:#f39c12;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;background:var(--bg);color:var(--text);padding:0 0 24px;-webkit-tap-highlight-color:transparent}
header{background:linear-gradient(135deg,#2a2a10,#3a3010,#2a2a10);padding:5px 12px;text-align:center;border-bottom:2px solid var(--yellow)}
header h1{font-size:12px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5);letter-spacing:.03em}
.wrap{max-width:480px;margin:0 auto;padding:0 6px}

/* section */
.sec{background:var(--card);border:2px solid rgba(240,216,48,.25);border-radius:7px;margin:4px 0;padding:5px 8px;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.sec-title{font-size:10px;font-weight:800;color:var(--yellow);margin-bottom:2px;letter-spacing:.02em}

/* inputs */
.row{display:flex;gap:4px;margin:2px 0;align-items:center}
.row label{font-size:11px;color:var(--dim);min-width:0;font-weight:600;flex-shrink:0}
.row input,.row select{flex:1;border:1px solid var(--border);border-radius:5px;padding:5px 4px;font-size:14px;background:#1a1a2e;color:var(--text);font-family:inherit;min-width:0}
.row input:focus,.row select:focus{outline:none;border-color:var(--yellow);box-shadow:0 0 0 2px rgba(240,216,48,.25)}
.row input[type="number"]{-moz-appearance:textfield}
.row input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}
.row select{background:var(--card);color:var(--text)}
.sec-save-btn{background:linear-gradient(to bottom,#3a3a5c,#2a2a48);border:1px solid var(--border);border-radius:4px;padding:2px 10px;font-size:11px;font-weight:800;cursor:pointer;line-height:1.3;color:var(--yellow);letter-spacing:.04em;margin-left:6px;vertical-align:middle}
.sec-save-btn:active{background:rgba(240,216,48,.2)}

/* compact grid rows */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin:2px 0}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin:2px 0}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;margin:2px 0}
.g5{display:grid;grid-template-columns:3fr 4fr 4fr 4fr 7fr;gap:3px;margin:2px 0}
.g5b-labels{display:grid;grid-template-columns:5fr 4fr 4fr 4fr 5fr;gap:3px;margin:0 0 1px 0}
.g5b-labels span{font-size:10px;color:var(--dim);font-weight:600;text-align:center}
.g5b{display:grid;grid-template-columns:5fr 4fr 4fr 4fr 5fr;gap:3px;margin:0}
.g2 .row,.g3 .row,.g4 .row,.g5 .row,.g5b .row{margin:0;min-width:0}

/* card slots */
.cards-labels{display:flex;align-items:center;gap:0;margin-bottom:1px}
.cards-labels span{flex:1;text-align:center;font-size:9px;font-weight:700;color:var(--dim)}
.cards-labels .label-sep{flex:0 0 14px}
.cards-row{display:flex;gap:3px;align-items:center;margin:3px 0}
.slot-divider{flex:0 0 2px;height:36px;background:var(--border);border-radius:1px;margin:0 4px}
.card-slot{flex:1;height:32px;border:2px dashed var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;font-family:monospace;background:var(--bg);cursor:pointer;position:relative;transition:border-color .15s}
.card-slot.active-target{border-color:#786c18;background:rgba(120,108,24,.12)}
.card-slot.filled{border-style:solid;border-color:#786c18;background:#2a2a18}
.card-slot.filled.s,.card-slot.filled.c{color:#e0e0e0}
.card-slot.filled.h,.card-slot.filled.d{color:#ff4060}
.card-slot .x{position:absolute;top:-4px;right:-4px;width:14px;height:14px;background:var(--coral);color:#fff;border-radius:50%;font-size:9px;line-height:14px;text-align:center;font-weight:700;display:none}
.card-slot.filled .x{display:block}

/* card picker */
.picker{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:4px 4px;margin:4px 0;display:none}
.picker.show{display:block}
.pk-row{display:flex;gap:3px;margin:3px 0;justify-content:center}
.rank-btn{flex:1;max-width:38px;height:36px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text);font-size:13px;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.rank-btn:active{background:rgba(240,216,48,.2);border-color:var(--yellow)}
.rank-btn.used{opacity:.2;pointer-events:none}
.rank-btn.sel{background:var(--yellow);color:#1a1a1a;border-color:#d0c020}
.suit-btn{flex:1;max-width:50px;height:36px;border:1px solid var(--border);border-radius:5px;background:var(--bg);font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.suit-btn:active{background:rgba(240,216,48,.2);border-color:var(--yellow)}
.suit-btn.used{opacity:.2;pointer-events:none}
.suit-btn.s-s,.suit-btn.s-c{color:#ffffff}
.suit-btn.s-h,.suit-btn.s-d{color:#e85050}

/* player list */
.pl-row{display:flex;gap:3px;margin:2px 0;align-items:center}
.pl-row .d-tap{width:24px;height:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;font-size:11px;font-weight:800;color:transparent;border-radius:50%;line-height:1;padding-top:1px}
.pl-row .d-tap:active{transform:scale(.9)}
.pl-row .d-tap.is-btn{background:#e0e0e0;color:#1a1a1a}
.pl-row .seat-badge{display:flex;align-items:center;justify-content:center;width:30px;flex-shrink:0;cursor:pointer}
.pl-row .seat-badge:active{transform:scale(.9)}
.pl-row .seat-badge .seat-num{font-size:13px;font-weight:700;color:var(--dim);width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;border:2px solid transparent;line-height:1;padding-top:1px}
.pl-row:not(.inactive):not(.is-hero) .seat-badge .seat-num{background:#80355a;color:#fff;border-color:#80355a}
.pl-row.is-hero .seat-badge .seat-num{background:#786c18;color:#fff;border-color:#786c18}
.pl-row input.name-in{flex:1;height:30px;padding:0 6px;font-size:14px;border:2px solid #80355a;border-radius:5px;background:#1a1a1a;color:#fff;font-family:inherit;font-weight:600}
.pl-row input.name-in:focus{outline:none;border-color:#80355a;box-shadow:0 0 0 2px rgba(128,53,90,.3)}
.pl-row.is-hero input.name-in{border-color:#786c18}
.pl-row.is-hero input.name-in:focus{border-color:#786c18;box-shadow:0 0 0 2px rgba(120,108,24,.3)}
.pl-row .rm-btn{width:22px;height:22px;border:none;background:var(--border);color:var(--dim);border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;line-height:22px;text-align:center}
.pl-row.inactive{opacity:.3}
.pl-row.inactive .seat-badge{margin-right:20px}
.pl-row.inactive input.name-in{pointer-events:none}
.pl-row.inactive .rm-btn{background:#555}
.pl-row.is-hero{background:linear-gradient(90deg,rgba(240,216,48,.1),transparent);border-radius:5px}
.utg-hint{font-size:9px;color:var(--dim);font-weight:400;margin-left:6px}

/* generate */
.gen-btn{display:block;width:44%;margin:6px auto 4px;padding:5px 8px;border:none;border-radius:5px;font-size:11px;font-weight:800;color:#fff;cursor:pointer;background:linear-gradient(135deg,#a09018,#b8a820,#a09018);box-shadow:0 2px 6px rgba(0,0,0,.3);letter-spacing:.04em}
.gen-btn:active{transform:scale(.97)}

/* output */
.output-wrap{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:10000;background:var(--bg);flex-direction:column;overflow:hidden}
.output-wrap.show{display:flex}
.output-label{font-size:10px;color:var(--yellow);font-weight:600;padding:6px 12px 2px;flex-shrink:0}
.output-text{flex:1;width:100%;box-sizing:border-box;border:none;border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:6px 12px;font-size:14px;font-family:"SFMono-Regular",Consolas,monospace;color:var(--text);background:var(--bg);resize:none;line-height:1.5;-webkit-user-select:text;user-select:text;-webkit-appearance:none;cursor:text;outline:none}
.output-text:focus{box-shadow:none}
.resize-handle{display:none}
.custom-kb{background:var(--card);border-top:2px solid var(--border);padding:4px 4px 6px;flex-shrink:0}
.custom-kb.show{display:block}
.kb-row{display:flex;gap:3px;margin:3px 0;justify-content:center}
.kb-key{flex:1;max-width:38px;height:36px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text);font-size:13px;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.kb-key:active{background:rgba(240,216,48,.2);border-color:var(--yellow)}
.kb-key.wide{flex:1.6;max-width:62px;font-size:11px}
.kb-key.action{color:var(--yellow)}
.kb-key.suit-s,.kb-key.suit-c{color:#ffffff}
.kb-key.suit-h,.kb-key.suit-d{color:#e85050}
.kb-key.mode-btn{background:rgba(240,216,48,.1);border-color:rgba(240,216,48,.3);color:var(--yellow);font-size:10px;font-weight:800}
.kb-panel{display:none}
.kb-panel.active{display:block}
.kb-mode-indicator{text-align:center;font-size:9px;color:var(--dim);margin-bottom:2px;font-weight:600}
.copy-row{display:flex;gap:5px;padding:6px 12px;flex-shrink:0;justify-content:center}
.action-btn{flex:1;padding:5px 8px;border:none;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#a09018,#b8a820,#a09018);color:#fff}
.action-btn:active{transform:scale(.97)}
.action-btn.secondary{background:linear-gradient(to bottom,#3a3a5c,#2a2a48);border:1px solid rgba(240,216,48,.2);color:var(--yellow)}
.hands-badge{font-size:11px;background:rgba(240,216,48,.3);color:var(--yellow);border-radius:10px;padding:1px 7px;margin-left:4px;font-weight:800}
.hands-panel{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px;margin:6px 0;display:none}
.hands-panel.show{display:block}
.hand-item{background:var(--bg);border:1px solid var(--border);border-radius:6px;margin:4px 0;overflow:hidden}
.hand-item-header{display:flex;align-items:center;padding:6px 8px;cursor:pointer;gap:6px}
.hand-item-header .hand-title{flex:1;font-size:12px;font-weight:700;color:var(--yellow)}
.hand-item-header .hand-summary{flex:2;font-size:11px;color:var(--dim);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.hand-item-header .hand-del{background:none;border:1px solid var(--border);border-radius:4px;color:var(--coral);font-size:11px;font-weight:800;cursor:pointer;padding:1px 6px;line-height:1.2}
.hand-item-header .hand-del:active{background:rgba(231,76,60,.2)}
.hand-item-body{display:none;padding:4px 8px 8px;border-top:1px solid var(--border)}
.hand-item-body pre{margin:0;font-size:12px;line-height:1.4;white-space:pre-wrap;word-break:break-all;color:var(--text);background:none;border:none;padding:0}
.hand-item.open .hand-item-body{display:block}
.toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:#fff;color:#1a1a2e;padding:6px 18px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999}
.toast.show{opacity:1}

/* ===== v2 new styles ===== */
.view{display:none}
.view.active{display:block}

.session-bar{background:linear-gradient(135deg,#2a2a10,#3a3010);border:1px solid rgba(240,216,48,.3);border-radius:7px;padding:6px 10px;margin:4px 0;display:flex;flex-wrap:wrap;gap:4px 12px;align-items:center;font-size:11px}
.session-bar .sb-item{color:var(--dim);font-weight:600}
.session-bar .sb-item span{color:var(--text);font-weight:700}
.session-bar .sb-pl{font-size:13px;font-weight:800;margin-left:auto}
.session-bar .sb-pl.positive{color:var(--mint)}
.session-bar .sb-pl.negative{color:var(--coral)}
.sb-addbuy{background:linear-gradient(to bottom,#3a3a5c,#2a2a48);border:1px solid var(--border);border-radius:4px;color:var(--yellow);font-size:11px;font-weight:800;cursor:pointer;padding:2px 10px;margin-left:4px;font-family:inherit;letter-spacing:.04em;line-height:1.3}
.sb-addbuy:active{background:rgba(240,216,48,.2)}

.stat-cards{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:6px 0}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:8px 10px;text-align:center}
.stat-card .stat-label{font-size:9px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.stat-card .stat-value{font-size:18px;font-weight:800;color:var(--text);margin-top:2px}
.stat-card .stat-value.positive{color:var(--mint)}
.stat-card .stat-value.negative{color:var(--coral)}

.session-item{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:8px 10px;margin:4px 0;cursor:pointer;display:flex;align-items:center;gap:8px;transition:border-color .15s}
.session-item:active{border-color:var(--yellow)}
.session-item .si-info{flex:1;min-width:0}
.session-item .si-date{font-size:10px;color:var(--dim);font-weight:600}
.session-item .si-loc{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.session-item .si-meta{font-size:10px;color:var(--dim)}
.session-item .si-pl{font-size:15px;font-weight:800;text-align:right;min-width:70px}
.session-item .si-pl.positive{color:var(--mint)}
.session-item .si-pl.negative{color:var(--coral)}
.session-item .si-del{background:none;border:1px solid var(--border);border-radius:4px;color:var(--coral);font-size:10px;font-weight:800;cursor:pointer;padding:2px 6px;line-height:1.2;flex-shrink:0}
.session-item .si-del:active{background:rgba(231,76,60,.2)}

.session-actions{display:flex;gap:6px;margin:8px 0}
.session-actions .action-btn{flex:1}

.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-card{background:var(--card);border:2px solid rgba(240,216,48,.3);border-radius:10px;padding:16px;width:90%;max-width:360px;max-height:80vh;overflow-y:auto}
.modal-title{font-size:14px;font-weight:800;color:var(--yellow);margin-bottom:10px;text-align:center}
.modal-card .row{margin:6px 0}
.modal-card .row label{min-width:60px}
.modal-btn-row{display:flex;gap:6px;margin-top:12px}
.modal-btn-row .action-btn{flex:1}

.new-session-btn{display:block;width:100%;margin:8px 0;padding:10px;border:none;border-radius:7px;font-size:14px;font-weight:800;color:#fff;cursor:pointer;background:linear-gradient(135deg,#a09018,#b8a820,#a09018);box-shadow:0 3px 10px rgba(0,0,0,.4);letter-spacing:.04em}
.new-session-btn:active{transform:scale(.97)}

.detail-back{background:none;border:1px solid var(--border);border-radius:5px;color:var(--yellow);font-size:12px;font-weight:700;cursor:pointer;padding:4px 12px;margin-bottom:6px}
.detail-back:active{background:rgba(240,216,48,.1)}
.detail-summary{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:10px;margin:6px 0}
.detail-summary .ds-row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px;border-bottom:1px solid rgba(58,58,92,.3)}
.detail-summary .ds-row:last-child{border-bottom:none}
.detail-summary .ds-label{color:var(--dim);font-weight:600}
.detail-summary .ds-value{color:var(--text);font-weight:700}
.detail-summary .ds-value.positive{color:var(--mint)}
.detail-summary .ds-value.negative{color:var(--coral)}
.ds-value.editable{cursor:pointer;border-bottom:1px dashed rgba(240,216,48,.3)}
.ds-edit-input{background:var(--bg);border:1px solid var(--yellow);border-radius:3px;color:var(--text);font-size:13px;font-weight:700;text-align:right;padding:2px 6px;width:60%;font-family:inherit}
.no-sessions{text-align:center;color:var(--dim);font-size:13px;padding:20px 0}

/* ===== Trip styles ===== */
.trip-item{background:var(--card);border:2px solid rgba(240,216,48,.2);border-radius:10px;padding:12px 14px;margin:6px 0;cursor:pointer;transition:border-color .15s}
.trip-item:active{border-color:var(--yellow)}
.trip-item .trip-title{font-size:15px;font-weight:800;color:var(--text);margin-bottom:4px}
.trip-item .trip-date{font-size:10px;color:var(--dim);font-weight:600;margin-bottom:6px}
.trip-item .trip-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.trip-item .trip-stat{text-align:center}
.trip-item .trip-stat-label{font-size:9px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.trip-item .trip-stat-value{font-size:14px;font-weight:800;color:var(--text);margin-top:1px}
.trip-item .trip-stat-value.positive{color:var(--mint)}
.trip-item .trip-stat-value.negative{color:var(--coral)}
.trip-item .trip-actions{display:flex;gap:6px;margin-top:8px;justify-content:flex-end}
.trip-item .trip-act-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--dim);font-size:10px;font-weight:700;cursor:pointer;padding:2px 8px;line-height:1.3}
.trip-item .trip-act-btn:active{background:rgba(240,216,48,.1)}
.trip-item .trip-act-btn.del{color:var(--coral)}
.trip-item .trip-act-btn.del:active{background:rgba(231,76,60,.2)}
.trip-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.trip-header .trip-back{background:none;border:1px solid var(--border);border-radius:5px;color:var(--yellow);font-size:12px;font-weight:700;cursor:pointer;padding:4px 12px}
.trip-header .trip-back:active{background:rgba(240,216,48,.1)}
.trip-header .trip-name{font-size:14px;font-weight:800;color:var(--yellow);flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

/* ===== Guide styles ===== */
.guide-box{background:var(--card);border:2px solid rgba(240,216,48,.15);border-radius:10px;padding:14px 16px;margin:8px 0}
.guide-box .guide-title{font-size:13px;font-weight:800;color:var(--yellow);margin-bottom:8px;letter-spacing:.03em}
.guide-box .guide-steps{list-style:none;padding:0;margin:0}
.guide-box .guide-steps li{font-size:12px;color:var(--text);padding:5px 0;border-bottom:1px solid rgba(58,58,92,.3);display:flex;gap:8px;align-items:flex-start;line-height:1.5}
.guide-box .guide-steps li:last-child{border-bottom:none}
.guide-box .guide-steps .step-num{flex-shrink:0;width:20px;height:20px;border-radius:50%;background:rgba(240,216,48,.15);color:var(--yellow);font-size:10px;font-weight:800;text-align:center;line-height:20px}
.guide-box .guide-steps .step-text{flex:1}
.guide-box .guide-steps .step-text strong{color:var(--yellow)}
.guide-box .guide-steps .step-text .step-sub{display:inline;font-size:11px;color:var(--dim);margin-left:4px}
.guide-section{margin-top:6px}
.guide-section .guide-section-title{font-size:11px;font-weight:700;color:var(--dim);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.05em}
.guide-section p{font-size:11px;color:var(--dim);line-height:1.6;margin:3px 0}

/* ===== Footer styles ===== */
.app-footer{display:flex;align-items:center;justify-content:space-between;padding:6px 16px;margin-top:0;max-width:480px;margin-left:auto;margin-right:auto}
.app-footer .footer-icons{display:flex;align-items:center;gap:1px}
.app-footer .footer-icons a:first-of-type{margin-left:4px}
.app-footer .footer-icons a{display:flex;align-items:center;justify-content:center;width:30px;height:30px;color:var(--dim);text-decoration:none;transition:color .15s}
.app-footer .footer-icons a:hover,.app-footer .footer-icons a:active{color:var(--yellow)}
.app-footer .footer-icons a svg{width:16px;height:16px;fill:currentColor}
.app-footer .footer-copy{font-size:10px;color:var(--dim);letter-spacing:.03em}
.footer-link-btn{background:linear-gradient(to bottom,#3a3a5c,#2a2a48);border:1px solid var(--border);border-radius:4px;padding:3px 10px;font-size:12px;font-weight:800;cursor:pointer;color:var(--yellow);letter-spacing:.02em;font-family:inherit;line-height:1.3;white-space:nowrap;margin-right:3px}
.footer-link-btn:active{background:rgba(240,216,48,.2)}
</style>
</head>
<body>

<!-- ===== View 0: Trips List ===== -->
<div class="view" id="viewTrips">
<div class="wrap">
  <img src="title_image_lv07.png" alt="Sapiens Poker Logger" style="width:100%;border-radius:0;margin:6px 0;display:block">
  <p style="font-size:11px;color:var(--dim);line-height:1.6;text-align:center;margin:4px 0 8px">当アプリは、ライブポーカーのハンド履歴をその場で素早く記録するためのアプリです。プレイ時間や収支を自動集計。登録不要、完全無料、すぐにご利用可能です。</p>
  <button class="new-session-btn" onclick="showNewTripModal()">新しい記録を作成</button>
  <div id="tripsList"></div>
  <div id="tripsGuide"></div>
</div>
</div>

<!-- ===== View 1: Sessions List (per Trip) ===== -->
<div class="view" id="viewSessions">
<div class="wrap">
  <div class="trip-header">
    <button class="trip-back" onclick="showView('trips')">&larr; 記録一覧</button>
    <span class="trip-name" id="currentTripName"></span>
  </div>
  <div id="cumulativeStats"></div>
  <button class="new-session-btn" onclick="showNewSessionModal()">New Session</button>
  <div id="sessionsList"></div>
  <div class="session-actions" id="tripExportActions" style="margin-top:10px;display:none">
    <button class="action-btn secondary" onclick="exportTripCSV()">CSV Export</button>
  </div>
</div>
</div>

<!-- ===== View 2: Active Session ===== -->
<div class="view" id="viewActive">
<div class="wrap">

  <!-- Session info bar -->
  <div class="session-bar" id="sessionBar"></div>

  <!-- Hand / Blind / Hero -->
  <div class="sec">
    <div class="sec-title">Hand / Blind <button class="sec-save-btn" onclick="saveAllDefaults(this)" title="Blind/Hero/Stack&#x306E;&#x30C7;&#x30D5;&#x30A9;&#x30EB;&#x30C8;&#x3092;&#x4E00;&#x62EC;&#x4FDD;&#x5B58;">SAVE</button></div>
    <input type="hidden" id="heroSeat" value="1">
    <div class="g5b-labels">
      <span>Hand #</span><span>SB</span><span>BB</span><span>Ante</span><span></span>
    </div>
    <div class="g5b">
      <div class="row"><input type="number" id="handNum" value="1" min="1" max="99" inputmode="numeric"></div>
      <div class="row"><input type="number" id="sb" value="50" inputmode="numeric"></div>
      <div class="row"><input type="number" id="bb" value="100" inputmode="numeric"></div>
      <div class="row"><input type="number" id="ante" value="0" inputmode="numeric"></div>
      <div class="row"><select id="blindPreset" onchange="applyBlindPreset()"><option value="">---</option><option value="1/2">1/2</option><option value="1/3">1/3</option><option value="2/3">2/3</option><option value="2/5">2/5</option><option value="5/5">5/5</option><option value="10/20">10/20</option><option value="25/50">25/50</option><option value="50/100" selected>50/100</option><option value="100/200">100/200</option><option value="200/300">200/300</option><option value="200/400">200/400</option><option value="200/500">200/500</option><option value="300/500">300/500</option><option value="400/800">400/800</option><option value="500/1000">500/1000</option></select></div>
    </div>
    <div class="g2">
      <div class="row"><label>Hero</label><input type="text" id="heroName" value="&#x30C1;&#x30F3;&#x30D1;&#x30F3;" oninput="syncHeroName()"></div>
      <div class="row"><label>Stack</label><input type="number" id="heroStack" value="50000" inputmode="numeric"></div>
    </div>
  </div>

  <!-- Cards -->
  <div class="sec">
    <div class="sec-title">Cards</div>
    <div class="cards-labels">
      <span>Hero</span><span>Hero</span>
      <span class="label-sep"></span>
      <span>Flop</span><span></span><span></span><span>Turn</span><span>River</span>
    </div>
    <div class="cards-row">
      <div class="card-slot" id="heroSlot0" onclick="onSlotClick(event,'heroCards',0)"></div>
      <div class="card-slot" id="heroSlot1" onclick="onSlotClick(event,'heroCards',1)"></div>
      <div class="slot-divider"></div>
      <div class="card-slot" id="boardSlot0" onclick="onSlotClick(event,'boardCards',0)"></div>
      <div class="card-slot" id="boardSlot1" onclick="onSlotClick(event,'boardCards',1)"></div>
      <div class="card-slot" id="boardSlot2" onclick="onSlotClick(event,'boardCards',2)"></div>
      <div class="card-slot" id="boardSlot3" onclick="onSlotClick(event,'boardCards',3)"></div>
      <div class="card-slot" id="boardSlot4" onclick="onSlotClick(event,'boardCards',4)"></div>
    </div>
    <div class="picker" id="sharedPicker"></div>
  </div>

  <!-- Players -->
  <div class="sec">
    <div class="sec-title">Players <span class="utg-hint">D=BTN / &#x756A;&#x53F7;=Hero</span> <button class="sec-save-btn" onclick="saveDefaultPlayers(this)" title="&#x30C7;&#x30D5;&#x30A9;&#x30EB;&#x30C8;&#x4EBA;&#x6570;&#x3092;&#x4FDD;&#x5B58;">SAVE</button></div>
    <div id="playerList"></div>
  </div>

  <!-- Generate + Hands + End row -->
  <div style="display:flex;gap:4px;margin:6px 0 4px">
    <button class="gen-btn" onclick="generate()" style="margin:0;width:auto;flex:2">&#x30C6;&#x30F3;&#x30D7;&#x30EC;&#x30FC;&#x30C8;&#x751F;&#x6210;</button>
    <button class="gen-btn" id="handsToggle" onclick="toggleHandsPanel()" style="margin:0;width:auto;flex:1;background:linear-gradient(to bottom,#3a3a5c,#2a2a48);border:1px solid rgba(240,216,48,.2);color:var(--yellow)">Hands <span class="hands-badge" id="handsBadge">0</span></button>
    <button class="gen-btn" onclick="showEndSessionModal()" style="margin:0;width:auto;flex:1;background:linear-gradient(to bottom,#3a2a2a,#2a1a1a);border:1px solid rgba(220,60,60,.3);color:#e86060;font-size:10px">End</button>
  </div>

  <!-- Output -->
  <div class="output-wrap" id="outputWrap">
    <div class="output-label">&#9998; &#x7DE8;&#x96C6;&#x53EF; &mdash; &#x30A2;&#x30AF;&#x30B7;&#x30E7;&#x30F3;&#x3092;&#x8FFD;&#x8A18;&#x3057;&#x3066;&#x304F;&#x3060;&#x3055;&#x3044;</div>
    <textarea class="output-text" id="outputText"></textarea>
    <div class="resize-handle" id="resizeHandle"><span></span></div>
    <div class="custom-kb" id="customKb">
      <div class="kb-panel active" id="kbAction">
        <div class="kb-mode-indicator">ACTION</div>
        <div class="kb-row">
          <button class="kb-key" data-v="1">1</button><button class="kb-key" data-v="2">2</button><button class="kb-key" data-v="3">3</button><button class="kb-key" data-v="4">4</button><button class="kb-key" data-v="5">5</button><button class="kb-key" data-v="6">6</button><button class="kb-key" data-v="7">7</button><button class="kb-key" data-v="8">8</button><button class="kb-key" data-v="9">9</button><button class="kb-key" data-v="0">0</button><button class="kb-key" data-v="#">#</button>
        </div>
        <div class="kb-row">
          <button class="kb-key action" data-v="x">x</button><button class="kb-key action" data-v="c">c</button><button class="kb-key action" data-v="b">b</button><button class="kb-key action" data-v="r">r</button><button class="kb-key action" data-v="f">f</button><button class="kb-key action" data-v="ai">ai</button><button class="kb-key action" data-v="win">win</button><button class="kb-key action" data-v="chop">chop</button>
        </div>
        <div class="kb-row">
          <button class="kb-key" data-cmd="left">&larr;</button><button class="kb-key" data-cmd="right">&rarr;</button><button class="kb-key wide" data-v=" ">&#x2423;</button><button class="kb-key wide" data-cmd="bs">&larr;&#x232B;</button><button class="kb-key" data-cmd="enter">&crarr;</button><button class="kb-key wide mode-btn" data-cmd="card">CARD</button><button class="kb-key wide mode-btn" data-cmd="abc">ABC</button>
        </div>
      </div>
      <div class="kb-panel" id="kbCard">
        <div class="kb-mode-indicator">CARD</div>
        <div class="kb-row">
          <button class="kb-key" data-v="A">A</button><button class="kb-key" data-v="2">2</button><button class="kb-key" data-v="3">3</button><button class="kb-key" data-v="4">4</button><button class="kb-key" data-v="5">5</button><button class="kb-key" data-v="6">6</button><button class="kb-key" data-v="7">7</button>
        </div>
        <div class="kb-row">
          <button class="kb-key" data-v="8">8</button><button class="kb-key" data-v="9">9</button><button class="kb-key" data-v="10">10</button><button class="kb-key" data-v="J">J</button><button class="kb-key" data-v="Q">Q</button><button class="kb-key" data-v="K">K</button>
        </div>
        <div class="kb-row">
          <button class="kb-key wide suit-s" data-v="s">&spades;</button><button class="kb-key wide suit-c" data-v="c">&clubs;</button><button class="kb-key wide suit-h" data-v="h">&hearts;</button><button class="kb-key wide suit-d" data-v="d">&diams;</button>
        </div>
        <div class="kb-row">
          <button class="kb-key" data-cmd="left">&larr;</button><button class="kb-key" data-cmd="right">&rarr;</button><button class="kb-key wide" data-v=" ">&#x2423;</button><button class="kb-key wide" data-cmd="bs">&larr;&#x232B;</button><button class="kb-key" data-cmd="enter">&crarr;</button><button class="kb-key wide mode-btn" data-cmd="action">ACT</button>
        </div>
      </div>
    </div>
    <div class="copy-row">
      <button class="action-btn" onclick="saveToHandList()">Save</button>
      <button class="action-btn secondary" onclick="discardOutput()">Cancel</button>
    </div>
  </div>

<script>
// ===== Data structures =====
var RANK_ROWS = [['A','2','3','4','5'],['6','7','8','9','T'],['J','Q','K']];
var RANKS = RANK_ROWS.reduce(function(a,b){return a.concat(b)},[]);
var SUITS = [{k:'s',sym:'\u2660',cls:'suit-s'},{k:'c',sym:'\u2663',cls:'suit-c'},{k:'h',sym:'\u2665',cls:'suit-h'},{k:'d',sym:'\u2666',cls:'suit-d'}];
var allUsed = new Set();
var cardData = {
  heroCards: {cards:[], max:2},
  boardCards: {cards:[], max:5}
};
var activeTarget = 'heroCards';
var selRank = null;
var removedSeats = new Set([10]);
var btnSeat = 1;

var sessions = [];
var activeSessionId = null;
var currentDetailId = null;
var timerInterval = null;

var trips = [];
var currentTripId = null;

var FEEDBACK_URL = 'https://forms.gle/XDw4C5kKdToUyaW5A';

// ===== Picker (from v1) =====
function buildPicker() {
  var picker = document.getElementById('sharedPicker');
  var row1Ranks = ['A','2','3','4','5','6','7','8','9','T'];
  var row2Ranks = ['J','Q','K'];
  var html = '<div class="pk-row">';
  row1Ranks.forEach(function(r) {
    var display = r === 'T' ? '10' : r;
    html += '<button class="rank-btn" data-rank="'+r+'" onclick="pickRank(\''+r+'\',this)">'+display+'</button>';
  });
  html += '</div><div class="pk-row">';
  row2Ranks.forEach(function(r) {
    html += '<button class="rank-btn" data-rank="'+r+'" onclick="pickRank(\''+r+'\',this)">'+r+'</button>';
  });
  var suits = [{k:'s',sym:'&spades;'},{k:'c',sym:'&clubs;'},{k:'h',sym:'&hearts;'},{k:'d',sym:'&diams;'}];
  suits.forEach(function(s) {
    html += '<button class="suit-btn s-'+s.k+'" data-suit="'+s.k+'" onclick="pickSuit(\''+s.k+'\')">'+s.sym+'</button>';
  });
  html += '</div>';
  picker.innerHTML = html;
}

function pickRank(rank, btn) {
  var picker = document.getElementById('sharedPicker');
  picker.querySelectorAll('.rank-btn').forEach(function(b){b.classList.remove('sel')});
  btn.classList.add('sel');
  selRank = rank;
  refreshUsed();
}

function pickSuit(suit) {
  if (!selRank) return;
  var st = cardData[activeTarget];
  if (st.cards.length >= st.max) return;

  var card = selRank + suit;
  var cardUpper = card.toUpperCase();
  if (allUsed.has(cardUpper)) return;

  st.cards.push(card);
  allUsed.add(cardUpper);
  selRank = null;

  var picker = document.getElementById('sharedPicker');
  picker.querySelectorAll('.rank-btn').forEach(function(b){b.classList.remove('sel')});

  renderAllSlots();
  refreshUsed();

  if (activeTarget === 'heroCards' && st.cards.length >= st.max) {
    setTarget('boardCards');
  }
}

function removeSlotCard(target, idx) {
  var st = cardData[target];
  if (!st.cards[idx]) return;
  var removed = st.cards.splice(idx, 1)[0];
  allUsed.delete(removed.toUpperCase());
  renderAllSlots();
  refreshUsed();
  setTarget(target);
}

function onSlotClick(e, target, idx) {
  e.stopPropagation();
  var st = cardData[target];
  if (st.cards[idx]) {
    removeSlotCard(target, idx);
  } else {
    setTarget(target);
  }
  showPicker();
}

function showPicker(){
  document.getElementById('sharedPicker').classList.add('show');
}
function hidePicker(){
  document.getElementById('sharedPicker').classList.remove('show');
  document.querySelectorAll('.card-slot').forEach(function(el){el.classList.remove('active-target')});
}

function setTarget(target) {
  activeTarget = target;
  selRank = null;
  var picker = document.getElementById('sharedPicker');
  picker.querySelectorAll('.rank-btn').forEach(function(b){b.classList.remove('sel')});
  document.querySelectorAll('.card-slot').forEach(function(el){el.classList.remove('active-target')});
  var prefix = target === 'heroCards' ? 'heroSlot' : 'boardSlot';
  var max = cardData[target].max;
  for (var i = 0; i < max; i++) {
    var el = document.getElementById(prefix + i);
    if (!cardData[target].cards[i]) el.classList.add('active-target');
  }
  refreshUsed();
}

function refreshUsed() {
  var picker = document.getElementById('sharedPicker');
  picker.querySelectorAll('.rank-btn').forEach(function(rb) {
    var rank = rb.dataset.rank;
    var anyAvail = SUITS.some(function(s){return !allUsed.has((rank+s.k).toUpperCase())});
    rb.classList.toggle('used', !anyAvail);
  });
  picker.querySelectorAll('.suit-btn').forEach(function(sb) {
    var suit = sb.dataset.suit;
    if (selRank) {
      sb.classList.toggle('used', allUsed.has((selRank+suit).toUpperCase()));
    } else {
      sb.classList.remove('used');
    }
  });
}

// ===== Slot rendering (from v1) =====
function renderAllSlots() {
  renderSlotRow('heroCards', 'heroSlot', 2);
  renderSlotRow('boardCards', 'boardSlot', 5);
  var prefix = activeTarget === 'heroCards' ? 'heroSlot' : 'boardSlot';
  var max = cardData[activeTarget].max;
  for (var i = 0; i < max; i++) {
    var el = document.getElementById(prefix + i);
    if (!cardData[activeTarget].cards[i]) el.classList.add('active-target');
  }
}

function renderSlotRow(target, prefix, count) {
  var st = cardData[target];
  for (var i = 0; i < count; i++) {
    var el = document.getElementById(prefix + i);
    if (st.cards[i]) {
      var c = st.cards[i];
      var suit = c.slice(-1);
      var rank = c.slice(0, -1);
      var display = rank === 'T' ? '10' : rank;
      var sym = SUITS.filter(function(s){return s.k===suit})[0].sym;
      el.className = 'card-slot filled ' + suit;
      el.innerHTML = display + sym + '<span class="x">&times;</span>';
    } else {
      el.className = 'card-slot';
      el.innerHTML = '';
    }
  }
}

// ===== Player list (from v1) =====
function buildPlayerList() {
  var list = document.getElementById('playerList');
  list.innerHTML = '';
  for (var i = 1; i <= 10; i++) {
    var div = document.createElement('div');
    div.className = 'pl-row';
    if (removedSeats.has(i)) div.className += ' inactive';
    div.id = 'seat-' + i;
    div.dataset.seat = i;
    div.innerHTML = '<span class="d-tap" onclick="setBtn(' + i + ')">D</span>' +
      '<span class="seat-badge" onclick="setHero(' + i + ')"><span class="seat-num">' + i + '</span></span>' +
      '<input class="name-in" type="text" placeholder="\u540D\u524D" value="\u30D7\u30EC\u30A4\u30E4\u30FC">' +
      '<button class="rm-btn" onclick="toggleSeat(' + i + ')">&times;</button>';
    list.appendChild(div);
  }
  renderBtnMark();
}

function setBtn(seatNum) {
  if (removedSeats.has(seatNum)) return;
  btnSeat = seatNum;
  renderBtnMark();
}

function setHero(seatNum) {
  if (removedSeats.has(seatNum)) return;
  var heroNameVal = document.getElementById('heroName').value || localStorage.getItem('pokerDefaultHero_v2') || 'Hero';
  var prevSeat = parseInt(document.getElementById('heroSeat').value) || 0;
  if (prevSeat && prevSeat !== seatNum) {
    var prevEl = document.getElementById('seat-' + prevSeat);
    if (prevEl) {
      var prevInput = prevEl.querySelector('.name-in');
      if (prevInput.value === heroNameVal) prevInput.value = '\u30D7\u30EC\u30A4\u30E4\u30FC';
    }
  }
  document.getElementById('heroSeat').value = seatNum;
  var el = document.getElementById('seat-' + seatNum);
  if (el) el.querySelector('.name-in').value = heroNameVal;
  highlightHeroSeat();
}

function applyBlindPreset() {
  var v = document.getElementById('blindPreset').value;
  if (!v) return;
  var parts = v.split('/');
  document.getElementById('sb').value = parts[0];
  document.getElementById('bb').value = parts[1];
}

function syncHeroName() {
  var heroNameVal = document.getElementById('heroName').value;
  var heroSeat = document.getElementById('heroSeat').value;
  var el = document.getElementById('seat-' + heroSeat);
  if (el) el.querySelector('.name-in').value = heroNameVal;
}

function renderBtnMark() {
  document.querySelectorAll('.pl-row .d-tap').forEach(function(el) {
    var s = parseInt(el.closest('.pl-row').dataset.seat);
    el.classList.toggle('is-btn', s === btnSeat);
  });
}

function toggleSeat(seatNum) {
  var el = document.getElementById('seat-' + seatNum);
  if (!el) return;
  if (removedSeats.has(seatNum)) {
    el.classList.remove('inactive');
    removedSeats.delete(seatNum);
  } else {
    el.classList.add('inactive');
    removedSeats.add(seatNum);
    if (seatNum === btnSeat) {
      for (var n = 1; n <= 10; n++) {
        var next = ((btnSeat - 1 + n) % 10) + 1;
        if (!removedSeats.has(next)) { btnSeat = next; break; }
      }
      renderBtnMark();
    }
  }
}

function getActivePlayersUtgOrder() {
  var players = [];
  for (var n = 1; n <= 10; n++) {
    var seat = ((btnSeat - 1 + n) % 10) + 1;
    if (removedSeats.has(seat)) continue;
    var el = document.getElementById('seat-' + seat);
    if (!el) continue;
    var name = el.querySelector('.name-in').value;
    if (name) players.push({seat: seat, name: name});
  }
  return players;
}

function highlightHeroSeat() {
  var hs = parseInt(document.getElementById('heroSeat').value) || 0;
  document.querySelectorAll('.pl-row').forEach(function(row) {
    row.classList.toggle('is-hero', parseInt(row.dataset.seat) === hs);
  });
}

// ===== Generate (modified from v1 - no video/ifb/ifi) =====
function generate() {
  var hn = (document.getElementById('handNum').value || '1');

  lines.push('');

  lines.push('');
  lines.push('');
  lines.push('');

  var bc = cardData.boardCards.cards;
  function fmtCard(c){var r=c.slice(0,-1);return (r==='T'?'10':r)+c.slice(-1)}
  if (bc.length >= 3) {
    lines.push('---flop ' + bc.slice(0,3).map(fmtCard).join(' '));
  } else {
    lines.push('---flop');
  }
  lines.push('');
  lines.push('');
  lines.push('');

  if (bc.length >= 4) {
    lines.push('---turn ' + fmtCard(bc[3]));
  } else {
    lines.push('---turn');
  }
  lines.push('');
  lines.push('');
  lines.push('');

  if (bc.length >= 5) {
    lines.push('---river ' + fmtCard(bc[4]));
  } else {
    lines.push('---river');
  }
  lines.push('');
  lines.push('');
  lines.push('');

  lines.push('---sd');
  lines.push('');
  lines.push('');
  lines.push('');
  lines.push('---result');
  lines.push('');
  lines.push('');
  lines.push('');
  lines.push('#\u30E1\u30E2');
  lines.push('');

  var text = lines.join('\n');
  var ta = document.getElementById('outputText');
  ta.value = text;
  document.getElementById('outputWrap').classList.add('show');

  document.getElementById('handNum').value = window._lastGeneratedHn + 1;
  cardData.heroCards.cards.forEach(function(c){ allUsed.delete(c.toUpperCase()); });
  cardData.boardCards.cards.forEach(function(c){ allUsed.delete(c.toUpperCase()); });
  cardData.heroCards.cards = [];
  cardData.boardCards.cards = [];
  activeTarget = 'heroCards';
  selRank = null;
  renderAllSlots();
  refreshUsed();
  var picker = document.getElementById('sharedPicker');
  picker.querySelectorAll('.rank-btn').forEach(function(b){b.classList.remove('sel')});

// ===== Utility functions =====
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')}, 1500);
}

function formatDate(iso) {
  if (!iso) return '--';
  var d = new Date(iso);
  var mm = ('0' + (d.getMonth()+1)).slice(-2);
  var dd = ('0' + d.getDate()).slice(-2);
  var hh = ('0' + d.getHours()).slice(-2);
  var mi = ('0' + d.getMinutes()).slice(-2);
  return mm + '/' + dd + ' ' + hh + ':' + mi;
}

function formatDateShort(iso) {
  if (!iso) return '--';
  var d = new Date(iso);
  var y = d.getFullYear();
  var mm = ('0' + (d.getMonth()+1)).slice(-2);
  var dd = ('0' + d.getDate()).slice(-2);
  return y + '/' + mm + '/' + dd;
}

function formatCurrency(n) {
  var num = parseInt(n) || 0;
  var sign = num >= 0 ? '+' : '';
  return sign + formatNumber(num);
}

function formatNumber(n) {
  var num = parseInt(n) || 0;
  var neg = num < 0;
  var abs = Math.abs(num);
  var str = abs.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return neg ? '-' + str : str;
}

function formatElapsed(startISO) {
  if (!startISO) return '0h 0m';
  var start = new Date(startISO).getTime();
  var now = Date.now();
  var diff = Math.max(0, now - start);
  var totalMin = Math.floor(diff / 60000);
  var h = Math.floor(totalMin / 60);
  var m = totalMin % 60;
  return h + 'h ' + m + 'm';
}

// ===== View Management =====
function showView(name) {
  document.getElementById('viewTrips').classList.remove('active');
  document.getElementById('viewSessions').classList.remove('active');
  document.getElementById('viewActive').classList.remove('active');
  document.getElementById('viewDetail').classList.remove('active');
  if (name === 'trips') {
    document.getElementById('viewTrips').classList.add('active');
    renderTripsList();
    stopTimer();
  } else if (name === 'sessions') {
    document.getElementById('viewSessions').classList.add('active');
    var trip = getTrip(currentTripId);
    var nameEl = document.getElementById('currentTripName');
    if (nameEl) nameEl.textContent = trip ? trip.title : '';
    renderCumulativeStats();
    renderSessionsList();
    stopTimer();
  } else if (name === 'active') {
    document.getElementById('viewActive').classList.add('active');
    renderSessionBar();
    updateHandsBadge();
    startTimer();
  } else if (name === 'detail') {
    document.getElementById('viewDetail').classList.add('active');
    renderSessionDetail(currentDetailId);
    stopTimer();
  }
}

// ===== Trip CRUD =====
function loadTrips() {
  try {
    var d = localStorage.getItem('pokerTrips_v1');
    if (d) trips = JSON.parse(d);
  } catch(e) {
    trips = [];
  }
}

function persistTrips() {
  localStorage.setItem('pokerTrips_v1', JSON.stringify(trips));
}

function getTrip(id) {
  for (var i = 0; i < trips.length; i++) {
    if (trips[i].id === id) return trips[i];
  }
  return null;
}

function createTrip(data) {
  var trip = {
    id: 'trip_' + Date.now() + '_' + Math.floor(Math.random()*10000),
    title: data.title || '',
    createdAt: new Date().toISOString(),
    status: 'active'
  };
  trips.unshift(trip);
  persistTrips();
  return trip;
}

function deleteTrip(id) {
  for (var i = 0; i < trips.length; i++) {
    if (trips[i].id === id) {
      // Delete all sessions in this trip
      sessions = sessions.filter(function(s) { return s.tripId !== id; });
      persistSessions();
      trips.splice(i, 1);
      persistTrips();
      renderTripsList();
      return;
    }
  }
}

function calcTripStats(tripId) {
  var tripSessions = sessions.filter(function(s) { return s.tripId === tripId; });
  var completed = tripSessions.filter(function(s) { return s.status === 'completed'; });
  var totalProfit = 0;
  var totalMin = 0;
  for (var i = 0; i < completed.length; i++) {
    var st = calcSessionStats(completed[i]);
    totalProfit += st.profit;
    totalMin += st.durationMin;
  }
  return {
    sessionCount: tripSessions.length,
    completedCount: completed.length,
    totalProfit: totalProfit,
    totalHours: Math.round(totalMin / 60 * 10) / 10
  };
}

function confirmDeleteTrip(id) {

// ===== Session CRUD =====
function loadSessions() {
  try {
    var d = localStorage.getItem('pokerSessions_v2');
    if (d) sessions = JSON.parse(d);
  } catch(e) {
    sessions = [];
  }
}

function persistSessions() {
  localStorage.setItem('pokerSessions_v2', JSON.stringify(sessions));
}

function getSession(id) {
  for (var i = 0; i < sessions.length; i++) {
    if (sessions[i].id === id) return sessions[i];
  }
  return null;
}

function getActiveSession() {
  for (var i = 0; i < sessions.length; i++) {
    if (sessions[i].status === 'active') return sessions[i];
  }
  return null;
}

function createSession(data) {
  var sbVal = parseInt(data.sb) || 0;
  var bbVal = parseInt(data.bb) || 0;
  var now = new Date().toISOString();
  var session = {
    id: 'sess_' + Date.now() + '_' + Math.floor(Math.random()*10000),
    tripId: currentTripId || '',
    location: data.location || '',
    gameType: data.gameType || 'NLH',
    sb: sbVal,
    bb: bbVal,
    blindPhases: [{ sb: sbVal, bb: bbVal, startTime: now }],
    buyIns: [parseInt(data.buyInAmount) || 0],
    cashOut: 0,
    startTime: now,
    endTime: null,
    status: 'active',
    hands: []
  };
  sessions.unshift(session);
  persistSessions();
  activeSessionId = session.id;

  // Set blinds on the active session UI
  var blindStr = session.sb + '/' + session.bb;
  var sel = document.getElementById('blindPreset');
  var found = false;
  for (var i = 0; i < sel.options.length; i++) {
    if (sel.options[i].value === blindStr) {
      sel.value = blindStr;
      found = true;
      break;
    }
  }
  if (!found) {
    document.getElementById('sb').value = session.sb;
    document.getElementById('bb').value = session.bb;
  } else {
    applyBlindPreset();
  }

  document.getElementById('handNum').value = 1;
  showView('active');
  return session;
}

function endSession(cashOut) {
  var session = getActiveSession();
  if (!session) return;
  session.cashOut = parseInt(cashOut) || 0;
  session.endTime = new Date().toISOString();
  session.status = 'completed';
  persistSessions();
  activeSessionId = null;
  stopTimer();
  showView('sessions');
  showToast('Session ended');
}

function addBuyInToSession(amount) {
  var session = getActiveSession();
  if (!session) return;
  session.buyIns.push(parseInt(amount) || 0);
  persistSessions();
  renderSessionBar();
  showToast('Buy-in added: ' + formatNumber(amount));
}

function deleteSession(id) {
  for (var i = 0; i < sessions.length; i++) {
    if (sessions[i].id === id) {
      if (sessions[i].status === 'active') {
        activeSessionId = null;
        stopTimer();
      }
      sessions.splice(i, 1);
      persistSessions();
      renderCumulativeStats();
      renderSessionsList();
      return;
    }
  }
}

// ===== Blind Phase Management =====
function getCurrentBlinds(session) {
  if (session.blindPhases && session.blindPhases.length > 0) {
    var last = session.blindPhases[session.blindPhases.length - 1];
    return { sb: last.sb, bb: last.bb };
  }
  return { sb: session.sb || 0, bb: session.bb || 0 };
}

function getBlindsLabel(session) {
  if (session.blindPhases && session.blindPhases.length > 1) {
    return session.blindPhases.map(function(p) { return p.sb + '/' + p.bb; }).join(' → ');
  }
  return (session.sb || 0) + '/' + (session.bb || 0);
}


// ===== Session Stats =====
function calcSessionStats(session) {
  var totalBuyIn = 0;
  for (var i = 0; i < session.buyIns.length; i++) {
    totalBuyIn += session.buyIns[i];
  }
  var cashOut = session.cashOut || 0;
  var profit = cashOut - totalBuyIn;
  var durationMin = 0;
  if (session.startTime) {
    var end = session.endTime ? new Date(session.endTime).getTime() : Date.now();
    durationMin = Math.max(0, Math.floor((end - new Date(session.startTime).getTime()) / 60000));
  }

  // Weighted average BB calculation for blind phases
  var bb = session.bb || 1;
  if (session.blindPhases && session.blindPhases.length > 1) {
    var endTime = session.endTime ? new Date(session.endTime).getTime() : Date.now();
    var totalWeightedBB = 0;
    var totalPhaseMin = 0;
    for (var i = 0; i < session.blindPhases.length; i++) {
      var phase = session.blindPhases[i];
      var phaseStart = new Date(phase.startTime).getTime();
      var phaseEnd = (i + 1 < session.blindPhases.length) ? new Date(session.blindPhases[i + 1].startTime).getTime() : endTime;
      var phaseMin = Math.max(0, (phaseEnd - phaseStart) / 60000);
      totalWeightedBB += phase.bb * phaseMin;
      totalPhaseMin += phaseMin;
    }
    bb = totalPhaseMin > 0 ? (totalWeightedBB / totalPhaseMin) : (session.bb || 1);
  }

  var hours = durationMin / 60;
  var bbPerHour = hours > 0 ? ((profit / bb) / hours) : 0;
  return {
    totalBuyIn: totalBuyIn,
    cashOut: cashOut,
    profit: profit,
    durationMin: durationMin,
    bbPerHour: Math.round(bbPerHour * 10) / 10,
    handCount: session.hands ? session.hands.length : 0
  };
}

// ===== Session Rendering =====
function getTripSessions() {
  if (!currentTripId) return sessions;
  return sessions.filter(function(s) { return s.tripId === currentTripId; });
}

function renderCumulativeStats() {
  var el = document.getElementById('cumulativeStats');
  var tripSess = getTripSessions();
  var completed = tripSess.filter(function(s){return s.status === 'completed'});
  if (completed.length === 0) {
    el.innerHTML = '<div class="stat-cards"><div class="stat-card"><div class="stat-label">Total P/L</div><div class="stat-value">--</div></div><div class="stat-card"><div class="stat-label">Sessions</div><div class="stat-value">0</div></div><div class="stat-card"><div class="stat-label">Total Hours</div><div class="stat-value">--</div></div><div class="stat-card"><div class="stat-label">BB/hr</div><div class="stat-value">--</div></div></div>';
    return;
  }
  var totalProfit = 0;
  var totalMin = 0;
  var totalBBProfit = 0;
  for (var i = 0; i < completed.length; i++) {
    var st = calcSessionStats(completed[i]);
    totalProfit += st.profit;
    totalMin += st.durationMin;
    var bb = completed[i].bb || 1;
    totalBBProfit += st.profit / bb;
  }
  var totalHours = Math.round(totalMin / 60 * 10) / 10;
  var avgBBhr = totalHours > 0 ? Math.round((totalBBProfit / totalHours) * 10) / 10 : 0;
  var plClass = totalProfit >= 0 ? 'positive' : 'negative';

  el.innerHTML = '<div class="stat-cards">' +
    '<div class="stat-card"><div class="stat-label">Total P/L</div><div class="stat-value ' + plClass + '">' + formatCurrency(totalProfit) + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">Sessions</div><div class="stat-value">' + completed.length + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">Total Hours</div><div class="stat-value">' + totalHours + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">BB/hr</div><div class="stat-value ' + plClass + '">' + avgBBhr + '</div></div>' +
    '</div>';
}

function renderSessionsList() {
  var el = document.getElementById('sessionsList');
  var filteredSessions = getTripSessions();
  var exportEl = document.getElementById('tripExportActions');
  if (filteredSessions.length === 0) {
    el.innerHTML = '<div class="no-sessions">\u30BB\u30C3\u30B7\u30E7\u30F3\u304C\u3042\u308A\u307E\u305B\u3093</div>';

    return;
  }
  var hasCompleted = filteredSessions.some(function(s) { return s.status === 'completed'; });

  var html = '';
  for (var i = 0; i < filteredSessions.length; i++) {
    var s = filteredSessions[i];
    var st = calcSessionStats(s);
    var plClass = st.profit >= 0 ? 'positive' : 'negative';
    var durStr = Math.floor(st.durationMin / 60) + 'h ' + (st.durationMin % 60) + 'm';
    var statusLabel = s.status === 'active' ? ' [\u9032\u884C\u4E2D]' : '';
    html += '<div class="session-item" onclick="openSessionDetail(\'' + s.id + '\')">' +
      '<div class="si-info">' +
      '<div class="si-date">' + formatDateShort(s.startTime) + statusLabel + '</div>' +
      '<div class="si-loc">' + escHtml(s.location || 'No Location') + '</div>' +
      '<div class="si-meta">' + escHtml(s.gameType) + ' ' + getBlindsLabel(s) + ' | ' + durStr + ' | ' + st.handCount + ' hands</div>' +
      '</div>' +
      '<div class="si-pl ' + plClass + '">' + (s.status === 'completed' ? formatCurrency(st.profit) : '--') + '</div>' +
      '<button class="si-del" onclick="event.stopPropagation();confirmDeleteSession(\'' + s.id + '\')">DEL</button>' +
      '</div>';

}

function renderSessionBar() {

function openSessionDetail(id) {

    activeSessionId = s.id;
    showView('active');
    return;
  }
  currentDetailId = id;
  showView('detail');
}

function renderSessionDetail(id) {
  var el = document.getElementById('detailContent');

  if (!s) { el.innerHTML = '<p class="no-sessions">\u30BB\u30C3\u30B7\u30E7\u30F3\u304C\u898B\u3064\u304B\u308A\u307E\u305B\u3093</p>'; return; }
  var st = calcSessionStats(s);
  var plClass = st.profit >= 0 ? 'positive' : 'negative';

function toggleDetailHandItem(i) {
  var el = document.getElementById('dhi-' + i);
  if (el) el.classList.toggle('open');
}

function editDetailField(sessionId, field, el) {
  var s = getSession(sessionId);
  if (!s) return;
  var currentVal = field === 'cashOut' ? s.cashOut : (s[field] || '');
  if (field === 'gameType') {
    var sel = document.createElement('select');
    sel.className = 'ds-edit-input';
    ['NLH','PLO'].forEach(function(opt) {
      var o = document.createElement('option');
      o.value = opt; o.textContent = opt;
      if (opt === s.gameType) o.selected = true;
      sel.appendChild(o);
    });
    el.innerHTML = '';
    el.appendChild(sel);
    sel.focus();
    sel.onchange = function() { saveDetailField(sessionId, field, sel.value); };
    sel.onblur = function() { saveDetailField(sessionId, field, sel.value); };
  } else {
    var inp = document.createElement('input');
    inp.className = 'ds-edit-input';
    inp.type = field === 'cashOut' ? 'number' : 'text';
    inp.value = currentVal;
    if (field === 'cashOut') inp.inputMode = 'numeric';
    el.innerHTML = '';
    el.appendChild(inp);
    inp.focus();
    inp.select();
    inp.onblur = function() { saveDetailField(sessionId, field, inp.value); };
    inp.onkeydown = function(e) { if (e.key === 'Enter') inp.blur(); };
  }
  el.onclick = null;
}

function saveDetailField(sessionId, field, value) {
  var s = getSession(sessionId);
  if (!s) return;
  if (field === 'cashOut') {
    s.cashOut = parseInt(value) || 0;
  } else {
    s[field] = value;
  }
  persistSessions();
  renderSessionDetail(sessionId);
}

function editDateTime(sessionId) {
  var s = getSession(sessionId);
  if (!s) return;
  var pad = function(n) { return n < 10 ? '0' + n : n; };
  var toDateVal = function(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
  };
  var getParts = function(iso) {
    if (!iso) return { h:0, m:0 };
    var d = new Date(iso);
    return { h:d.getHours(), m:d.getMinutes() };
  };
  var st = getParts(s.startTime);
  var en = getParts(s.endTime);
  var ds = 'font-size:14px;font-weight:700;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px 6px;font-family:inherit';
  var ts = 'width:44px;text-align:center;font-size:14px;font-weight:700;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px 2px;font-family:inherit;-moz-appearance:textfield';
  var sep = '<span style="color:var(--dim);font-weight:700;font-size:14px;line-height:30px">';

  var html = '<style>.dt-num::-webkit-inner-spin-button,.dt-num::-webkit-outer-spin-button{opacity:1;height:20px}</style>';
  var lb = 'font-size:12px;color:var(--dim);font-weight:700;width:30px;flex-shrink:0';
  html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">';
  html += '<span style="'+lb+'">開始</span>';
  html += '<input type="date" id="dtSD" value="'+toDateVal(s.startTime)+'" style="'+ds+'">';
  html += '<input type="number" class="dt-num" id="dtSh" value="'+pad(st.h)+'" min="0" max="23" style="'+ts+'">';
  html += sep+':</span><input type="number" class="dt-num" id="dtSm" value="'+pad(st.m)+'" min="0" max="59" style="'+ts+'">';
  html += '</div>';

  html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">';
  html += '<span style="'+lb+'">終了</span>';
  html += '<input type="date" id="dtED" value="'+toDateVal(s.endTime)+'" style="'+ds+'">';
  html += '<input type="number" class="dt-num" id="dtEh" value="'+pad(en.h)+'" min="0" max="23" style="'+ts+'">';
  html += sep+':</span><input type="number" class="dt-num" id="dtEm" value="'+pad(en.m)+'" min="0" max="59" style="'+ts+'">';
  html += '</div>';

  html += '<div style="font-size:9px;color:var(--dim);text-align:center;margin-bottom:6px">時刻はマウスホイールでも変更できます</div>';
  html += '<div class="modal-btn-row" style="margin-top:4px">';
  html += '<button class="action-btn" onclick="saveDateTime(\'' + sessionId + '\')">保存</button>';
  html += '<button class="action-btn secondary" onclick="hideModal()">Cancel</button>';
  html += '</div>';
  showModal('日時編集', html);
  setTimeout(function() {
    var nums = document.querySelectorAll('.dt-num');
    for (var i = 0; i < nums.length; i++) {
      nums[i].addEventListener('wheel', function(e) {
        e.preventDefault();
        var el = e.target;
        var step = e.deltaY < 0 ? 1 : -1;
        var val = parseInt(el.value) + step;
        var mn = parseInt(el.min);
        var mx = parseInt(el.max);
        if (val < mn) val = mx;
        if (val > mx) val = mn;
        el.value = val < 10 ? '0' + val : val;
      }, { passive: false });
    }
  }, 100);
}

function saveDateTime(sessionId) {
  var s = getSession(sessionId);
  if (!s) return;
  var v = function(id) { return parseInt(document.getElementById(id).value) || 0; };
  var buildFromDateInput = function(dateId, hId, mId) {
    var dateVal = document.getElementById(dateId).value;
    if (!dateVal) return null;
    var parts = dateVal.split('-');
    var dt = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]), v(hId), v(mId));
    return isNaN(dt.getTime()) ? null : dt.toISOString();
  };
  var newStart = buildFromDateInput('dtSD','dtSh','dtSm');

function exportTripCSV() {
  var trip = getTrip(currentTripId);
  if (!trip) { showToast('Tripが見つかりません'); return; }
  var tripSess = getTripSessions();
  var completed = tripSess.filter(function(s) { return s.status === 'completed'; });
  if (completed.length === 0) { showToast('完了セッションがありません'); return; }

  // Sort by startTime
  completed.sort(function(a, b) { return new Date(a.startTime).getTime() - new Date(b.startTime).getTime(); });

  // Group by date (local)
  var days = {};
  var dayOrder = [];
  for (var i = 0; i < completed.length; i++) {
    var s = completed[i];
    var d = new Date(s.startTime);
    var dayKey = d.getFullYear() + '/' + ('0'+(d.getMonth()+1)).slice(-2) + '/' + ('0'+d.getDate()).slice(-2);
    if (!days[dayKey]) { days[dayKey] = []; dayOrder.push(dayKey); }
    days[dayKey].push(s);
  }

  var BOM = '\uFEFF';
  var lines = [];
  lines.push('Day,Session#,Location,Game,Blinds,StartTime,EndTime,Hours,BuyIn,CashOut,P/L,DayCumulativeP/L,TripCumulativeP/L');

  var tripCumPL = 0;
  for (var di = 0; di < dayOrder.length; di++) {
    var dayKey = dayOrder[di];
    var daySessions = days[dayKey];
    var dayCumPL = 0;

    for (var si = 0; si < daySessions.length; si++) {
      var s = daySessions[si];
      var st = calcSessionStats(s);
      var blindsStr = getBlindsLabel(s);
      var durHours = Math.round(st.durationMin / 60 * 10) / 10;

      dayCumPL += st.profit;
      tripCumPL += st.profit;

      var startD = new Date(s.startTime);
      var endD = new Date(s.endTime);
      var startStr = ('0'+startD.getHours()).slice(-2) + ':' + ('0'+startD.getMinutes()).slice(-2);
      var endStr = ('0'+endD.getHours()).slice(-2) + ':' + ('0'+endD.getMinutes()).slice(-2);

      var row = [
        dayKey,
        ('0' + (si + 1)).slice(-2),
        '"' + (s.location || '').replace(/"/g, '""') + '"',
        s.gameType || 'NLH',
        '"' + blindsStr + '"',
        startStr,
        endStr,
        durHours,
        st.totalBuyIn,
        st.cashOut,
        st.profit,
        dayCumPL,
        tripCumPL
      ];
      lines.push(row.join(','));
    }
  }

  var csv = BOM + lines.join('\r\n');
  var blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  var titleStr = (trip.title || 'trip').replace(/[^a-zA-Z0-9\u3000-\u9FFF]/g, '_');
  a.download = 'trip_' + titleStr + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  showToast('CSV exported: ' + completed.length + ' sessions');
}

function exportSessionHands(sessionId) {

// ===== Migration =====
function migrateData() {
  // Migrate existing sessions without tripId
  var needsMigration = false;
  for (var i = 0; i < sessions.length; i++) {
    if (!sessions[i].tripId) {
      needsMigration = true;
      break;
    }
  }
  // Migrate sessions without blindPhases
  for (var i = 0; i < sessions.length; i++) {
    if (!sessions[i].blindPhases) {
      sessions[i].blindPhases = [{ sb: sessions[i].sb || 0, bb: sessions[i].bb || 0, startTime: sessions[i].startTime }];
    }
  }

  if (needsMigration) {
    // Create a default trip for orphan sessions
    var defaultTrip = {
      id: 'trip_migrated_default',
      title: '未分類セッション',
      createdAt: sessions.length > 0 ? sessions[sessions.length - 1].startTime : new Date().toISOString(),
      status: 'active'
    };
    // Check if default trip already exists
    if (!getTrip(defaultTrip.id)) {
      trips.push(defaultTrip);
      persistTrips();
    }
    for (var i = 0; i < sessions.length; i++) {
      if (!sessions[i].tripId) {
        sessions[i].tripId = defaultTrip.id;
      }
    }
    persistSessions();
  }
}

(function(){
  var handle = document.getElementById('resizeHandle');
  var ta = document.getElementById('outputText');
  if(!handle || !ta) return;
  var startY, startH, scrollOffset, rafId, dragging, lastClientY;
  var EDGE = 80, MAX_SPEED = 14;
  function tick(){
    if(!dragging){ return; }
    var vh = window.innerHeight;
    var distBottom = vh - lastClientY;
    var distTop = lastClientY;
    var scrolled = 0;
    if(distBottom < EDGE){
      var speed = Math.round(MAX_SPEED * (1 - distBottom / EDGE));
      window.scrollBy(0, speed);
      scrolled = speed;
    } else if(distTop < EDGE){
      var speed = Math.round(MAX_SPEED * (1 - distTop / EDGE));
      window.scrollBy(0, -speed);
      scrolled = -speed;
    }
    if(scrolled !== 0){
      scrollOffset += scrolled;
      var newH = Math.max(100, startH + (lastClientY - startY) + scrollOffset);
      ta.style.height = newH + 'px';
    }
    rafId = requestAnimationFrame(tick);
  }
  function onStart(e){
    var ev = e.touches ? e.touches[0] : e;
    startY = ev.clientY;
    lastClientY = startY;
    startH = ta.offsetHeight;
    scrollOffset = 0;
    dragging = true;
    ta.style.minHeight = '100px';
    document.addEventListener('mousemove', onMove, {passive:false});
    document.addEventListener('mouseup', onEnd);
    document.addEventListener('touchmove', onMove, {passive:false});
    document.addEventListener('touchend', onEnd);
    rafId = requestAnimationFrame(tick);
    e.preventDefault();
  }
  function onMove(e){
    var ev = e.touches ? e.touches[0] : e;
    lastClientY = ev.clientY;
    var newH = Math.max(100, startH + (lastClientY - startY) + scrollOffset);
    ta.style.height = newH + 'px';
    e.preventDefault();
  }
  function onEnd(){
    dragging = false;
    if(rafId) cancelAnimationFrame(rafId);
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onEnd);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onEnd);
  }
  handle.addEventListener('mousedown', onStart);
  handle.addEventListener('touchstart', onStart, {passive:false});
})();

/* --- Custom Keyboard --- */
(function(){
  var isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  var kb = document.getElementById('customKb');
  var ta = document.getElementById('outputText');
  var panelAction = document.getElementById('kbAction');
  var panelCard = document.getElementById('kbCard');
  if(!kb || !ta) return;

  var abcMode = false;

  function suppressOsKb(){
    ta.setAttribute('inputmode','none');
  }
  function restoreOsKb(){
    ta.removeAttribute('inputmode');
  }

  function showKb(){
    if(!isTouchDevice) return;
    kb.classList.add('show');
    suppressOsKb();
    abcMode = false;
    var abcBtn = kb.querySelector('[data-cmd="abc"]');
    if(abcBtn) abcBtn.style.background = '';
    panelAction.classList.add('active');
    panelCard.classList.remove('active');
  }
  function hideKb(){
    kb.classList.remove('show');
    restoreOsKb();
  }

  // Show KB when outputWrap becomes visible
  var observer = new MutationObserver(function(muts){
    muts.forEach(function(m){
      if(m.target.id === 'outputWrap'){
        if(m.target.classList.contains('show')){
          showKb();
        } else {
          hideKb();
        }
      }
    });
  });
  var ow = document.getElementById('outputWrap');
  if(ow) observer.observe(ow, {attributes:true, attributeFilter:['class']});

  function insertText(str){
    var s = ta.selectionStart || 0;
    var e = ta.selectionEnd || 0;
    var v = ta.value;
    ta.value = v.slice(0,s) + str + v.slice(e);
    var np = s + str.length;
    ta.setSelectionRange(np, np);
  }

  function handleKey(btn){
    var val = btn.getAttribute('data-v');
    var cmd = btn.getAttribute('data-cmd');

    if(val !== null){
      if(abcMode){
        suppressOsKb();
        abcMode = false;
        var abcBtn = kb.querySelector('[data-cmd="abc"]');
        if(abcBtn) abcBtn.style.background = '';
      }
      ta.focus();
      insertText(val);
      return;
    }
    if(!cmd) return;

    var s = ta.selectionStart || 0;
    switch(cmd){
      case 'left':
        ta.focus();
        if(s > 0){ ta.setSelectionRange(s-1, s-1); }
        break;
      case 'right':
        ta.focus();
        if(s < ta.value.length){ ta.setSelectionRange(s+1, s+1); }
        break;
      case 'bs':
        ta.focus();
        if(s > 0){
          ta.value = ta.value.slice(0, s-1) + ta.value.slice(s);
          ta.setSelectionRange(s-1, s-1);
        }
        break;
      case 'enter':
        ta.focus();
        insertText('\n');
        break;
      case 'card':
        panelAction.classList.remove('active');
        panelCard.classList.add('active');
        break;
      case 'action':
        panelCard.classList.remove('active');
        panelAction.classList.add('active');
        break;
      case 'abc':
        if(!abcMode){
          restoreOsKb();
          abcMode = true;
          btn.style.background = 'rgba(240,216,48,.35)';
          ta.focus();
        } else {
          suppressOsKb();
          abcMode = false;
          btn.style.background = '';
        }
        break;
    }
  }

  // Use event delegation on the keyboard container
  kb.addEventListener('touchstart', function(e){
    var btn = e.target.closest('.kb-key');
    if(!btn) return;
    e.preventDefault();
    handleKey(btn);
  }, {passive:false});

  kb.addEventListener('mousedown', function(e){
    var btn = e.target.closest('.kb-key');
    if(!btn) return;
    e.preventDefault();
    handleKey(btn);
  });
})();

init();

// Hide picker when tapping outside card slots / picker
document.addEventListener('click', function(e){
  var picker = document.getElementById('sharedPicker');
  if(!picker) return;
  if(e.target.closest('.picker') || e.target.closest('.card-slot')) return;
  hidePicker();
});
